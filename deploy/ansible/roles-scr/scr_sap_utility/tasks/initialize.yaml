# jobs
#   get SAP environment information
#     check for SAP user and group id's
#     check profiles for SAP environment variables
#

# Data Structure:
#   sap_env:
#     sap_sid:
#     Database:
#       DB_SID:
#       Type:
#       Version:
#       Availability:
#       Servers:
#         <server>:
#           Hostname:
#             instance_number:
#     application:
#       SCS:
#         Availability:
#         Servers:
#       APP:
#         Servers:
#           <server>:
#             Instance Number:
#             Hostname:


# region: Initialize sap_env variable with default structure
- name:
  ansible.builtin.set_fact:
    _results:                           null
    _filter_service_keys: 
                                        - AccessSELinuxContext
                                        - Control.*
                                        - CoredumpFilter
                                        - Description
                                        - Environment
                                        - ExecStart.*
                                        - ExecStop.*
                                        - FinalKillSignal
                                        - GID
                                        - Group
                                        - Id
                                        - KillMode
                                        - KillSignal
                                        - LoadState
                                        - Names
                                        - RequiresMountsFor
                                        - RestartKillSignal
                                        - SecureBits
                                        - SendSIGHUP
                                        - SendSIGKILL
                                        - Slice
                                        - SyslogIdentifier
                                        - UID
                                        - UMask
                                        - User
                                        - WorkingDirectory
    sap_env:
      application:
        scs:
          servers:                      [{}]
        app:
          servers:                      [{}]
      database:
        servers:                        [{}]
# endregion

# region: Get SAP sapadm user information
- name:   Get SAP sapadm user information
  ansible.builtin.getent:
    database:                           passwd
    key:                                sapadm


- name:   Register SAP sapadm user information in sap_env variable
  ansible.builtin.set_fact:
    sap_env: >-
                                        {{ sap_env 
                                            | combine({
                                                'application': {
                                                  'app': {
                                                    'servers': {
                                                      inventory_hostname: {
                                                        'sapadm_user':     'sapadm',
                                                        'sapadm_user_id':  getent_passwd['sapadm'][1] | default(''),
                                                        'sapadm_group_id': getent_passwd['sapadm'][2] | default(''),
                                                        'sapadm_homedir':  getent_passwd['sapadm'][4] | default(''),
                                                        'sapadm_shell':    getent_passwd['sapadm'][5] | default(''),
                                                      }
                                                    }
                                                  }
                                                }
                                              }, recursive=True)
                                        }}
  when: getent_passwd['sapadm'] is defined
# endregion

# region: Get SAP sidadm user information
- name:   Get SAP sidadm user information
  ansible.builtin.getent:
    database:                           passwd
    key:                                "{{ sapsid | lower }}adm"

- name:   Register SAP sidadm user information in sap_env variable
  ansible.builtin.set_fact:
    sap_env: >-
                                        {{ sap_env 
                                            | combine({'sap_sid': sapsid}, recursive=True)
                                            | combine({
                                                'application': {
                                                  'app': {
                                                    'servers': {
                                                      inventory_hostname: {
                                                        'sidadm_user':     sapsid | lower ~ 'adm',
                                                        'sidadm_user_id':  getent_passwd[sapsid | lower ~ 'adm'][1] | default(''),
                                                        'sidadm_group_id': getent_passwd[sapsid | lower ~ 'adm'][2] | default(''),
                                                        'sidadm_homedir':  getent_passwd[sapsid | lower ~ 'adm'][4] | default(''),
                                                        'sidadm_shell':    getent_passwd[sapsid | lower ~ 'adm'][5] | default(''),
                                                      }
                                                    }
                                                  }
                                                }
                                              }, recursive=True)
                                        }}
  when: getent_passwd[sapsid | lower ~ 'adm'] is defined
# endregion

# region: Get system initialization information
- name:
  ansible.builtin.set_fact:
    sap_env: >-
                                        {{ sap_env 
                                            | combine({
                                                'application': {
                                                  'app': {
                                                    'servers': {
                                                      inventory_hostname: {
                                                        'system_init':     ansible_facts.service_mgr,
                                                      } } } } }, recursive=True)
                                        }}
  when: 
                                        - ansible_facts.service_mgr is defined 
# endregion




- name:
  block:

# region: Get SAP systemd services information for saphostagent
    - name: Gather services
      ansible.builtin.systemd_service:
        name:                           'saphostagent'
      register:                         _results

    - name:
      ansible.builtin.set_fact:
        sap_env: >-
                                            {{ sap_env
                                                | combine({
                                                    'application': {
                                                      'app': {
                                                        'servers': {
                                                          inventory_hostname: {
                                                            'systemd_services': (
                                                              (
                                                                sap_env | default({})
                                                              ).get('application', {})
                                                               .get('app', {})
                                                               .get('servers', {})
                                                               .get(inventory_hostname, {})
                                                               .get('systemd_services', {}) | default({})
                                                            ) 
                                                            | combine({
                                                                _results.name: _results.status | default({})
                                                                | dict2items
                                                                | selectattr('key', 'match', '^(' ~ _filter_service_keys | join('|') ~ ')')
                                                                | items2dict
                                                              })
                                                          } } } } }, recursive=True)
                                            }}
      when:   _results.status.LoadState | default('') == 'loaded'
# endregion

# region: Get SAP systemd services information for SAPX91_00
    - name: Gather services
      ansible.builtin.systemd_service:
        name:                           'SAPX91_00'
      register:                         _results

    - name:
      ansible.builtin.set_fact:
        sap_env: >-
                                            {{ sap_env
                                                | combine({
                                                    'application': {
                                                      'app': {
                                                        'servers': {
                                                          inventory_hostname: {
                                                            'systemd_services': (
                                                              (
                                                                sap_env | default({})
                                                              ).get('application', {})
                                                               .get('app', {})
                                                               .get('servers', {})
                                                               .get(inventory_hostname, {})
                                                               .get('systemd_services', {}) | default({})
                                                            ) 
                                                            | combine({
                                                                _results.name: _results.status | default({})
                                                                | dict2items
                                                                | selectattr('key', 'match', '^(' ~ _filter_service_keys | join('|') ~ ')')
                                                                | items2dict
                                                              })
                                                          } } } } }, recursive=True)
                                            }}
      when:   _results.status.LoadState | default('') == 'loaded'
# endregion





  when: ansible_facts.service_mgr == 'systemd'




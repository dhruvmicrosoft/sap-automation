---
# defaults for scr_log_upload role
# Azure connection details are inherited from scr_common defaults;
# override here or via inventory/extra-vars if this role is used standalone.

# File patterns to match when searching for files to upload (.log = main log, .txt = discovery reports, .json = state objects)
scr_log_upload_pattern:
  - "*.log"
  - "*.txt"
  - "*.json"

# Directory to scan for log files (defaults to scr_common log dir)
scr_log_upload_dir:           "{{ scr_log_dir | default(ansible_env.HOME + '/scr/logs') }}"

# Blob path prefix — files land at tfstate/scr-runs/<run_id>/logs/<filename>
scr_log_upload_blob_prefix:   "scr-runs/{{ scr_blob_prefix | default('') }}logs/"

# MIME type sent with each uploaded blob
scr_log_upload_content_type:  "text/plain"

# When false the role succeeds silently if no log files are found (expected on the first run).
# Set to true to fail the play if no logs are present.
scr_log_upload_fail_if_none:  false

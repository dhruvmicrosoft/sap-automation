---
# scr_log_upload/tasks/main.yaml
#
# Uploads log files from the SCR log directory to Azure Blob Storage.
# Designed to be called as a pre_task at playbook start so that logs
# generated by previous runs are persisted before new work begins.
#
# Required vars (typically set by scr_common defaults):
#   scr_log_upload_dir           - directory containing log files
#   scr_log_upload_pattern       - glob pattern for log files (e.g. "*.log")
#   scr_log_upload_blob_prefix   - blob path prefix (e.g. "scr/run-id/logs/")
#   scr_log_upload_content_type  - MIME type for uploaded blobs
#   scr_auth_mode                - "msi" or "spn"
#   scr_azure_*                  - Azure connection variables (from scr_common)

# /*---------------------------------------------------------------------------8
# |                                                                            |
# |           Discover storage account name from resource group                |
# |                                                                            |
# +------------------------------------4--------------------------------------*/

- name:                                 "SCR Log Upload - Discover tfstate storage account in {{ scr_azure_resource_group }}"
  ansible.builtin.command: >-
    az storage account list
    --resource-group {{ scr_azure_resource_group }}
    --query "[?contains(name, 'tfstate')].name | [0]"
    --output tsv
  register:                             _scr_storage_account_discovery
  delegate_to:                          localhost
  run_once:                             true
  changed_when:                         false
  when:                                 scr_azure_storage_account is not defined

- name:                                 "SCR Log Upload - Set scr_azure_storage_account from discovery"
  ansible.builtin.set_fact:
    scr_azure_storage_account:          "{{ _scr_storage_account_discovery.stdout | trim }}"
  delegate_to:                          localhost
  run_once:                             true
  when:
    - scr_azure_storage_account is not defined
    - _scr_storage_account_discovery.stdout | trim | length > 0

- name:                                 "SCR Log Upload - Assert storage account was resolved"
  ansible.builtin.assert:
    that:
      - scr_azure_storage_account is defined
      - scr_azure_storage_account | length > 0
    fail_msg: >
      Could not resolve a storage account containing 'tfstate' in resource group
      '{{ scr_azure_resource_group }}'. Set scr_azure_storage_account explicitly
      via --extra-vars to bypass discovery.
  delegate_to:                          localhost
  run_once:                             true


# /*---------------------------------------------------------------------------8
# |                                                                            |
# |                   Discover log files to be uploaded                        |
# |                                                                            |
# +------------------------------------4--------------------------------------*/

- name:                                 "SCR Log Upload - Find log files in {{ scr_log_upload_dir }}"
  ansible.builtin.find:
    paths:                              "{{ scr_log_upload_dir }}"
    patterns:                           "{{ scr_log_upload_pattern }}"
    use_regex:                          false
    recurse:                            false
  register:                             scr_found_log_files
  delegate_to:                          localhost
  run_once:                             true


- name:                                 "SCR Log Upload - Assert log files exist (fail_if_none=true)"
  ansible.builtin.assert:
    that:
      - scr_found_log_files.files | length > 0
    fail_msg: >-
      No log files matching '{{ scr_log_upload_pattern }}' were found in
      '{{ scr_log_upload_dir }}'. Set scr_log_upload_fail_if_none: false to
      suppress this error on first runs.
  when:
    - scr_log_upload_fail_if_none | bool
  run_once:                             true


# /*---------------------------------------------------------------------------8
# |                                                                            |
# |              Upload each discovered log file to Azure Blob                 |
# |                                                                            |
# +------------------------------------4--------------------------------------*/

- name:                                 "SCR Log Upload - Upload log files"
  ansible.builtin.include_tasks:
    file:                               roles-scr/scr_log_upload/tasks/upload_logs.yaml
  vars:
    scr_log_file_path:                  "{{ item.path }}"
    scr_log_file_name:                  "{{ item.path | basename }}"
  loop:                                 "{{ scr_found_log_files.files }}"
  when:                                 scr_found_log_files.files | length > 0
  run_once:                             true


- name:                                 "SCR Log Upload - No log files found, skipping upload"
  ansible.builtin.debug:
    msg:
      - "No log files matching '{{ scr_log_upload_pattern }}' found in '{{ scr_log_upload_dir }}'."
      - "This is expected on the first playbook run. Skipping upload."
  when:                                 scr_found_log_files.files | length == 0
  run_once:                             true

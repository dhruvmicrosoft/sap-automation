---
# Build complete SCR state JSON from scratch with discovered facts
# This replaces the template → merge → update workflow with a single build operation

- name: Build complete SCR state structure
  set_fact:
    complete_scr_state:
      run_id: "{{ scr_run_id }}"
      source:
        sid: "{{ source_facts.sap.sid | default(scr_source_sid | default('')) }}"
        scs_host: "{{ source_facts.topology.scs_host | default(None) }}"
        facts:
          sap_kernel: "{{ source_facts.sap.kernel | default(None) }}"
          db_kernel: "{{ source_facts.db.version | default(None) }}"
          db_type: "{{ source_facts.db.type | default(scr_db_type | default('hana')) }}"
          os: >-
            {%- if source_facts.os is defined -%}
            {{ source_facts.os.distribution | default('') }} {{ source_facts.os.version | default('') }}
            {%- else -%}
            null
            {%- endif -%}
          topology:
            architecture: "{{ source_facts.topology.architecture | default(None) }}"
            scs_instance: "{{ source_facts.topology.scs_instance | default(None) }}"
            app_servers: "{{ source_facts.topology.app_servers | default([]) }}"
            app_server_count: "{{ source_facts.topology.app_server_count | default(0) }}"
            cluster_configured: "{{ source_facts.topology.cluster_configured | default(false) }}"
      target:
        sid: "{{ target_facts.sap.sid | default(scr_target_sid | default('')) }}"
        scs_host: "{{ target_facts.topology.scs_host | default(None) }}"
        facts:
          sap_kernel: "{{ target_facts.sap.kernel | default(None) }}"
          db_kernel: "{{ target_facts.db.version | default(None) }}"
          os: >-
            {%- if target_facts.os is defined -%}
            {{ target_facts.os.distribution | default('') }} {{ target_facts.os.version | default('') }}
            {%- else -%}
            null
            {%- endif -%}
          topology:
            architecture: "{{ target_facts.topology.architecture | default(None) }}"
            scs_instance: "{{ target_facts.topology.scs_instance | default(None) }}"
            app_servers: "{{ target_facts.topology.app_servers | default([]) }}"
            app_server_count: "{{ target_facts.topology.app_server_count | default(0) }}"
            cluster_configured: "{{ target_facts.topology.cluster_configured | default(false) }}"
        deployment:
          requested: false
          status: "unknown"
      refresh:
        protocol: "{{ scr_refresh_protocol | default('service') }}"
        retained_tables: "{{ scr_retained_tables | default([{'name': 'USR02', 'key': 'MANDT'}]) }}"
      parity:
        os: "{{ scr_parity.os | default(true) }}"
        sap_kernel: "{{ scr_parity.sap_kernel | default(true) }}"
        db_kernel: "{{ scr_parity.db_kernel | default(true) }}"
      telemetry:
        step_markers: []
        restart_marker: {}
      metadata:
        created: "{{ ansible_date_time.iso8601 }}"
        created_by: "{{ ansible_user | default('ansible') }}@{{ ansible_hostname }}"
        workflow_version: "2.0"

- name: Write complete SCR state to local file
  copy:
    content: "{{ complete_scr_state | to_nice_json(indent=2) }}"
    dest: "/tmp/{{ scr_state_blob_name }}"

- name: Display SCR state build summary
  debug:
    msg:
      - "Complete SCR state JSON built successfully"
      - "Source SID: {{ complete_scr_state.source.sid }}"
      - "Target SID: {{ complete_scr_state.target.sid }}"
      - "Local file: /tmp/{{ scr_state_blob_name }}"
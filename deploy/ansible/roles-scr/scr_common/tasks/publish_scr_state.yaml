---
# Publish SCR state JSON to Azure blob storage
# This task handles the actual upload of scr_state.json

- name: Validate publish parameters
  assert:
    that:
      - scr_blob_prefix is defined
      - scr_state_blob_name is defined
      - scr_blob_content_type is defined
    fail_msg: "Missing required parameters for publishing. Run datastore initialization first."

- name: Check if local SCR state file exists
  stat:
    path: "/tmp/{{ scr_state_blob_name }}"
  register: local_state_file

- name: Validate local SCR state exists
  assert:
    that:
      - local_state_file.stat.exists
    fail_msg: "Local SCR state file not found. Ensure JSON is prepared before publishing."

# Upload SCR state to Azure
- block:
    - name: Upload SCR state to Azure (MSI)
      azure.azcollection.azure_rm_storageblob:
        auth_source: msi
        resource_group: "{{ scr_azure_resource_group }}"
        storage_account_name: "{{ scr_azure_storage_account }}"
        container: "{{ scr_azure_container }}"
        blob: "{{ scr_blob_prefix }}{{ scr_state_blob_name }}"
        src: "/tmp/{{ scr_state_blob_name }}"
        content_type: "{{ scr_blob_content_type }}"
        state: present
      register: msi_upload_result
      
  when: scr_auth_mode == 'msi'

- block:
    - name: Upload SCR state to Azure (SPN)
      azure.azcollection.azure_rm_storageblob:
        auth_source: auto
        client_id: "{{ scr_azure_spn_client_id }}"
        secret: "{{ scr_azure_spn_client_secret }}"
        tenant: "{{ scr_azure_spn_tenant_id }}"
        subscription_id: "{{ scr_azure_subscription_id }}"
        resource_group: "{{ scr_azure_resource_group }}"
        storage_account_name: "{{ scr_azure_storage_account }}"
        container: "{{ scr_azure_container }}"
        blob: "{{ scr_blob_prefix }}{{ scr_state_blob_name }}"
        src: "/tmp/{{ scr_state_blob_name }}"
        content_type: "{{ scr_blob_content_type }}"
        state: present
      register: spn_upload_result
      
  when: scr_auth_mode == 'spn'

- name: Display publish results
  debug:
    msg:
      - "SCR state successfully published to Azure"
      - "Blob: {{ scr_blob_prefix }}{{ scr_state_blob_name }}"
      - "Container: {{ scr_azure_container }}"
      - "Storage Account: {{ scr_azure_storage_account }}"
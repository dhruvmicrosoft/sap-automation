---
# /*---------------------------------------------------------------------------8
# |  scr_common/defaults/main.yaml                                             |
# |                                                                            |
# |  Central configuration for all SCR roles and playbooks.                   |
# |  Loaded via vars_files in playbook_scr_initialize.yaml.                   |
# |                                                                            |
# |  Override any value via --extra-vars on the command line or via           |
# |  inventory group/host vars.                                               |
# +------------------------------------4--------------------------------------*/

# ── Controller paths ────────────────────────────────────────────────────────
scr_log_dir:              "{{ ansible_env.HOME | default('/tmp') }}/scr/logs"
scr_datastore_root:       "{{ ansible_env.HOME | default('/tmp') }}/scr/datastore"

# ── Run identity ────────────────────────────────────────────────────────────
# scr_run_id and scr_blob_prefix are set dynamically in the playbook pre_tasks
# using ansible_date_time so each run gets a unique folder in Azure.
scr_run_id:               "{{ ansible_date_time.iso8601 }}"

# ── Azure Blob Storage ───────────────────────────────────────────────────────
scr_azure_subscription_id:  "02993e58-2910-4b39-910c-aeccd207abf7"
scr_azure_resource_group:   "MKDS0-EUS2-SAP_LIBRARY"
scr_azure_storage_account:  "mkds0eus2tfstate152"
scr_azure_container:        "tfstate"         # existing container; SCR blobs land under scr-runs/ prefix

# ── Authentication — MSI (managed identity) ──────────────────────────────────
# The deployer VM's managed identity must have Storage Blob Data Contributor
# on the storage account. No client secrets needed.
scr_azure_use_managed_identity: true
scr_auth_mode:              "msi"

# ── Source system ────────────────────────────────────────────────────────────
# Note: scr_source_sid and scr_dest_sid must also be passed via --extra-vars
# because they are needed by the playbook hosts: pattern before vars_files loads.
scr_source_sid:             "X90"
scr_source_prefix:          "MKDS1-EUS2-SAP00"
scr_source_kv_name:         "MKDS1EUS2SAP00user54B"

# ── Destination system ───────────────────────────────────────────────────────
scr_dest_sid:               "X91"
scr_dest_prefix:            "MKDS1-EUS2-SAP00"
scr_dest_kv_name:           "MKDS1EUS2SAP00user54B"

# ── SCR workflow parameters ──────────────────────────────────────────────────
scr_db_type:                "hana"            # oracle | hana | ase
scr_refresh_protocol:       "service"         # service | local | snapshot | export_import
scr_retained_tables:                          # tables preserved during DB refresh
  - { name: "USR02", key: "MANDT" }
scr_parity:                                   # parity checks to perform before copy
  os:         true
  sap_kernel: true
  db_kernel:  true

# ── Legacy / unused defaults kept for backwards compatibility ────────────────
scr_datastore_prefix:       "scr"
scr_state_blob_name:        "scr_state.txt"
scr_logs_folder_name:       "logs"
scr_exports_folder_name:    "exports"
scr_blob_content_type:      "text/plain"
...
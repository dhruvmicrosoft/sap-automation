---
# scr_db_backup/tasks/fetch_db_password.yaml
#
# Fetch the HANA SYSTEMDB SYSTEM password from Key Vault and confirm
# it was retrieved. Each host fetches its OWN side's password (source
# hosts use db_source_password_secret_name from scr_source_kv_name;
# dest hosts use db_dest_password_secret_name from scr_dest_kv_name),
# because source and dest typically have different HANA SYSTEM
# passwords.
#
# We deliberately do NOT print the secret value.
#
# Required vars (caller must supply):
#   scr_source_sid / scr_dest_sid            SAP SIDs (used to locate
#                                            this host's group, e.g.
#                                            X90_DB / X91_DB).
#   scr_source_kv_name / scr_dest_kv_name    Per-side Key Vaults.
#   db_source_password_secret_name           Secret name on source side.
#   db_dest_password_secret_name             Secret name on dest side.
#   db_sid                                   HANA DB SID, e.g. "HDB"
#                                            (used as <sid>adm OS user).
#
# Optional:
#   db_instance_number                       HANA instance number
#                                            (default: "00").
#   msi_client_id                            If the controller has
#                                            multiple MSIs, specify
#                                            which one to use for KV
#                                            auth.
#
# Sets the following facts for downstream tasks:
#   _db_side          'source' or 'dest'
#   _db_kv_name       Resolved Key Vault name for this host's side
#   _db_secret_name   Resolved secret name for this host's side
#   _db_pwd_result    KV lookup result; secret value is at
#                     _db_pwd_result.secrets[0].secret


- name:                                 "scr_db_backup: Determine which side this host belongs to (source/dest)"
  ansible.builtin.set_fact:
    _db_side: >-
      {{ 'source' if ((scr_source_sid | upper) + '_DB') in group_names
         else ('dest' if ((scr_dest_sid | upper) + '_DB') in group_names
               else '') }}


- name:                                 "scr_db_backup: Resolve per-side KV + secret name for this host"
  ansible.builtin.set_fact:
    _db_kv_name:                        "{{ lookup('vars', 'scr_' + _db_side + '_kv_name') }}"
    _db_secret_name:                    "{{ lookup('vars', 'db_'  + _db_side + '_password_secret_name') }}"
  when:                                 _db_side | length > 0


- name:                                 "scr_db_backup: Validate required inputs"
  ansible.builtin.assert:
    that:
      - _db_side                         | length > 0
      - _db_kv_name      | default('') | length > 0
      - _db_secret_name  | default('') | length > 0
      - db_sid is defined and (db_sid | default('') | length > 0)
    fail_msg: |-
      scr_db_backup could not resolve required inputs on {{ inventory_hostname }}.
      Values resolved on this run:
        side                            = '{{ _db_side        | default('<NONE>') }}'
        scr_source_sid / scr_dest_sid   = '{{ scr_source_sid  | default('<UNDEFINED>') }}' / '{{ scr_dest_sid | default('<UNDEFINED>') }}'
        group_names                     = {{ group_names }}
        _db_kv_name                     = '{{ _db_kv_name     | default('<UNDEFINED>') }}'
        _db_secret_name                 = '{{ _db_secret_name | default('<UNDEFINED>') }}'
        db_sid                          = '{{ db_sid          | default('<UNDEFINED>') }}'
      Make sure this host is in either {{ scr_source_sid | default('?') | upper }}_DB or
      {{ scr_dest_sid | default('?') | upper }}_DB, and that the per-side vars
      (db_source_password_secret_name / db_dest_password_secret_name) are set.
    quiet:                              true


- name:                                 "scr_db_backup: Fetch HANA SYSTEMDB SYSTEM password from Key Vault (per host, delegated to controller)"
  azure.azcollection.azure_rm_keyvaultsecret_info:
    vault_uri:                          "https://{{ _db_kv_name | lower }}.vault.azure.net/"
    name:                               "{{ _db_secret_name }}"
    auth_source:                        msi
    client_id:                          "{{ msi_client_id | default(omit) }}"
  register:                             _db_pwd_result
  retries:                              5
  delay:                                1
  delegate_to:                          localhost
  failed_when:                          false
  no_log:                               true


# Surface a clear error if the KV fetch did not return a secret. The
# module's msg / failed fields are safe to print - the secret value is
# only ever in _db_pwd_result.secrets[0].secret, which we do not echo.
- name:                                 "scr_db_backup: Fail if Key Vault fetch did not return a secret"
  ansible.builtin.fail:
    msg: |-
      Failed to fetch secret '{{ _db_secret_name }}' from Key Vault
      '{{ _db_kv_name }}' (side={{ _db_side }}, host={{ inventory_hostname }}).
      Verify the vault exists, the secret name is correct, and the
      controller's managed identity has Get permission on this vault.
      failed = {{ _db_pwd_result.failed | default(true) }}
      msg    = {{ _db_pwd_result.msg    | default('') }}
  when: >-
    (_db_pwd_result.failed | default(true))
    or (_db_pwd_result.secrets | default([]) | length) == 0


- name:                                 "scr_db_backup: Confirm secret was fetched (no value printed)"
  ansible.builtin.debug:
    msg:
      - "Host:         {{ inventory_hostname }}"
      - "Side:         {{ _db_side }}"
      - "Key vault:    {{ _db_kv_name }}"
      - "Secret name:  {{ _db_secret_name }}"
      - "Status:       OK - password retrieved into _db_pwd_result (not printed)"

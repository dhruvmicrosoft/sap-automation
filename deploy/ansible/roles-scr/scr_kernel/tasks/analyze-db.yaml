# -------------------------------------------------------------------
# 1) Read /usr/sap/sapservices and determine startup facility
# -------------------------------------------------------------------
- name:                                 Read /usr/sap/sapservices
  ansible.builtin.slurp:
    src:                                "{{ sapservices_path }}"
  register:                             _results_b64


- name:                                 Normalize sapservices lines (strip comments + whitespace)
  ansible.builtin.set_fact:
    sapservices_lines: >-
                                        {{
                                          (_results_b64.content | b64decode).splitlines()
                                          | map('regex_replace', '\r$', '')
                                          | map('regex_replace', '\s*#.*$', '')
                                          | map('trim')
                                          | reject('equalto', '')
                                          | list
                                        }}


- name:                                 Detect whether systemd service or direct sapstartsrv is used
  ansible.builtin.set_fact:
    sap_start_facility: >-
                                        {%- set has_systemctl   = (sapservices_lines
                                                                  | select('search', '(^|\\s)systemctl(\\s|$)')
                                                                  | list | length) > 0                               -%}
                                        {%- set has_sapstartsrv = (sapservices_lines 
                                                                  | select('search', '(^|\\s)sapstartsrv(\\s|$)')
                                                                  | list | length) > 0                               -%}
                                        {%- if has_systemctl         -%}
                                        systemd_service
                                        {%- elif has_sapstartsrv     -%}
                                        sapstartsrv_direct
                                        {%- else                     -%}
                                        unknown
                                        {%- endif                    -%}


- name:                                 "Test"
  ansible.builtin.debug:
    msg: |-
                                        _results_b64:               {{ _results_b64 }}
                                        _results_decoded:           {{ _results_b64.content | b64decode }}
                                        sapservices_path:           {{ sapservices_path     | default('-')  }}
                                        sapservices_lines:          {{ sapservices_lines    | default('-') }}
                                        sap_start_facility:         {{ sap_start_facility   | default('-') }}
                                        sap_systemd_units:          {{ sap_systemd_units    | default('-') }}
                                        sap_unit:                   {{ sap_unit             | default('-') }}
                                        sap_pf:                     {{ sap_pf               | default('-') }}
                                        sap_system_name:            {{ sap_system_name      | default('-') }}
                                        sap_system:                 {{ sap_system           | default('-') }}
                                        sap_instance_name:          {{ sap_instance_name    | default('-') }}
    verbosity:                          0




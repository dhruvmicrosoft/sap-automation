---
# scr_log_function/tasks/index.yaml
#
# Manages the global SCR run index in Azure Blob Storage.
# The index is a single JSON file at a fixed path — not under any run_id —
# that tracks every SCR run across all executions.
#
# Supported actions:
#   register  — allocate the next run number, set scr_run_id fact, add Active entry
#   update    — set status (and end_date) on the current run
#
# vars:
#   action:          register | update
#   payload_message: register → dict { activity, source_sid, dest_sid }
#                    update   → status string
#                               (Active | Aborted | Completed-Success | Completed-Failed)
#
# Index blob path: scr-runs/scr_global_index.json  (fixed, not under any run_id)


# /*---------------------------------------------------------------------------8
# |                                                                            |
# |           Ensure local log directory exists                                |
# |                                                                            |
# +------------------------------------4--------------------------------------*/

- name:                                 "SCR Log Function [index] - Ensure log directory exists"
  ansible.builtin.file:
    path:                               "{{ scr_log_function_log_dir }}"
    state:                              directory
    mode:                               "0755"
  delegate_to:                          localhost


# /*---------------------------------------------------------------------------8
# |                                                                            |
# |     Download current index from Azure (ignored on the very first run)     |
# |                                                                            |
# +------------------------------------4--------------------------------------*/

- name:                                 "SCR Log Function [index] - Download global index"
  ansible.builtin.command: >-
    az storage blob download
    --account-name   {{ scr_azure_storage_account }}
    --container-name {{ scr_azure_container }}
    --name           {{ scr_log_function_index_blob }}
    --file           {{ scr_log_function_log_dir }}/scr_global_index.json
    --overwrite
    --auth-mode      login
  delegate_to:                          localhost
  changed_when:                         false
  failed_when:                          _scr_index_download.rc not in [0, 3]
  register:                             _scr_index_download

- name:                                 "SCR Log Function [index] - Load index from file"
  ansible.builtin.set_fact:
    _scr_index:                         "{{ lookup('file', scr_log_function_log_dir + '/scr_global_index.json') | from_json }}"
  delegate_to:                          localhost
  when:                                 _scr_index_download.rc == 0

- name:                                 "SCR Log Function [index] - Initialize empty index (first run)"
  ansible.builtin.set_fact:
    _scr_index:
      last_run_number:                  0
      runs:                             []
  delegate_to:                          localhost
  when:                                 _scr_index_download.rc != 0


# /*---------------------------------------------------------------------------8
# |                                                                            |
# |     REGISTER — allocate next run number, set scr_run_id, add entry        |
# |                                                                            |
# +------------------------------------4--------------------------------------*/

- name:                                 "SCR Log Function [index/register] - Allocate run number and write to file"
  ansible.builtin.copy:
    dest:                               "{{ scr_log_function_log_dir }}/.scr_run_id"
    content:                            "{{ '%04d' | format((_scr_index.last_run_number | int) + 1) }}"
    mode:                               "0644"
  delegate_to:                          localhost
  when:                                 action == 'register'

- name:                                 "SCR Log Function [index/register] - Set scr_run_id fact from file"
  ansible.builtin.set_fact:
    scr_run_id:                         "{{ lookup('file', scr_log_function_log_dir + '/.scr_run_id') }}"
  delegate_to:                          localhost
  delegate_facts:                       true
  when:                                 action == 'register'

- name:                                 "SCR Log Function [index/register] - Add run entry"
  ansible.builtin.set_fact:
    _scr_index_updated:
      last_run_number:                  "{{ hostvars['localhost']['scr_run_id'] | int }}"
      runs: >-
        {{ _scr_index.runs + [{
          'run_number': hostvars['localhost']['scr_run_id'] | int,
          'activity':   payload_message.activity,
          'source_sid': payload_message.source_sid,
          'dest_sid':   payload_message.dest_sid,
          'start_date': lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%SZ'),
          'end_date':   '',
          'status':     'Active'
        }] }}
  delegate_to:                          localhost
  when:                                 action == 'register'


# /*---------------------------------------------------------------------------8
# |                                                                            |
# |     UPDATE — set status and end_date on the current run                   |
# |                                                                            |
# +------------------------------------4--------------------------------------*/

- name:                                 "SCR Log Function [index/update] - Find current run entry"
  ansible.builtin.set_fact:
    _scr_current_run:                   "{{ _scr_index.runs | selectattr('run_number', 'equalto', hostvars['localhost']['scr_run_id'] | int) | first }}"
  delegate_to:                          localhost
  when:                                 action == 'update'

- name:                                 "SCR Log Function [index/update] - Build updated index"
  ansible.builtin.set_fact:
    _scr_index_updated:
      last_run_number:                  "{{ _scr_index.last_run_number }}"
      runs: >-
        {{ (_scr_index.runs | rejectattr('run_number', 'equalto', scr_run_id | int) | list)
           + [_scr_current_run | combine({
               'status':   payload_message,
               'end_date': lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%SZ')
             })] }}
  delegate_to:                          localhost
  when:                                 action == 'update'


# /*---------------------------------------------------------------------------8
# |                                                                            |
# |     Write updated index locally and upload to Azure                       |
# |                                                                            |
# +------------------------------------4--------------------------------------*/

- name:                                 "SCR Log Function [index] - Write updated index locally"
  ansible.builtin.copy:
    dest:                               "{{ scr_log_function_log_dir }}/scr_global_index.json"
    content:                            "{{ _scr_index_updated | to_nice_json }}"
    mode:                               "0644"
  delegate_to:                          localhost
  when:                                 _scr_index_updated is defined

- name:                                 "SCR Log Function [index] - Upload updated index to Azure"
  ansible.builtin.command: >-
    az storage blob upload
    --account-name   {{ scr_azure_storage_account }}
    --container-name {{ scr_azure_container }}
    --name           {{ scr_log_function_index_blob }}
    --file           {{ scr_log_function_log_dir }}/scr_global_index.json
    --overwrite
    --auth-mode      login
  delegate_to:                          localhost
  changed_when:                         true
  when:                                 _scr_index_updated is defined

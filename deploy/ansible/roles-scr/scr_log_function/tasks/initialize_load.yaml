---
# initialize_load.yaml
# Download the global SCR index from Azure (or initialize an empty one
# on the very first run), then normalize the schema so downstream tasks
# can rely on every expected key being present.

- name:                                 "SCR Log Function [index/load] - Ensure log directory exists"
  ansible.builtin.file:
    path:                               "{{ scr_log_function_local_log_dir }}"
    state:                              directory
    mode:                               "0755"
  delegate_to:                          localhost

- name:                                 "SCR Log Function [index/load] - Download global index from Azure"
  ansible.builtin.command: >-
                                        az storage blob download
                                          --account-name   {{ scr_azure_storage_account }}
                                          --container-name {{ scr_azure_container }}
                                          --name           {{ scr_log_function_index_blob }}
                                          --file           {{ scr_log_function_local_log_dir }}/scr_global_index.json
                                          --overwrite
                                          --auth-mode      login
  delegate_to:                          localhost
  changed_when:                         false
  failed_when:                          _scr_index_download.rc not in [0, 3]
  register:                             _scr_index_download

- name:                                 "SCR Log Function [index/load] - Load index from file"
  ansible.builtin.set_fact:
    _scr_index:                         "{{ lookup('file', scr_log_function_local_log_dir + '/scr_global_index.json') | from_json }}"
  when:                                 _scr_index_download.rc == 0

- name:                                 "SCR Log Function [index/load] - Initialize empty index (first run)"
  ansible.builtin.set_fact:
    _scr_index:
      last_job_number:                  0
      jobs:                             []
  when:                                 _scr_index_download.rc != 0

# Normalize top-level schema. Per-job fields like `last_completed_step`
# don't need normalization here — every read uses `| default(0)`.
- name:                                 "SCR Log Function [index/load] - Normalize top-level schema"
  ansible.builtin.set_fact:
    _scr_index:
      last_job_number:                  "{{ _scr_index.last_job_number | default(0) }}"
      jobs:                             "{{ _scr_index.jobs | default([]) }}"

---
# scr_log_function/tasks/main.yaml
#
# Generic log/storage function for SCR automation.
# Routes to one of four sub-tasks based on the `activity` variable.
#
# Required vars (set by caller):
#   activity:        log_summary | log_detail | object | file
#   action:          store | retrieve | update | delete
#   payload_message: string, list of strings, fact name(s), or file path(s)
#
# Optional vars:
#   result_var:   variable name to register retrieved data (object/file retrieve)
#   result_path:  local directory for downloaded files (file retrieve)


# /*---------------------------------------------------------------------------8
# |                                                                            |
# |           Discover storage account name from resource group                |
# |                                                                            |
# +------------------------------------4--------------------------------------*/

- name:                                 "SCR Log Function - Discover tfstate storage account in {{ scr_azure_resource_group }}"
  block:

    - name:                             "SCR Log Function - Discover tfstate storage account in {{ scr_azure_resource_group }}"
      ansible.builtin.command: >-
        az storage account list
        --resource-group {{ scr_azure_resource_group }}
        --query "[?contains(name, 'tfstate')].name | [0]"
        --output tsv
      register:                         _scr_lf_storage_discovery
      delegate_to:                      localhost
      run_once:                         true
      changed_when:                     false
      # when:                             scr_azure_storage_account is not defined

    - name:                             "SCR Log Function - Set scr_azure_storage_account from discovery"
      ansible.builtin.set_fact:
        scr_azure_storage_account:      "{{ _scr_lf_storage_discovery.stdout | trim }}"
      delegate_to:                      localhost
      run_once:                         true
      when:
        # - scr_azure_storage_account is not defined
        - _scr_lf_storage_discovery.stdout | trim | length > 0

  when:                                 scr_azure_storage_account is not defined


# /*---------------------------------------------------------------------------8
# |                                                                            |
# |                      Route to activity sub-task                            |
# |                                                                            |
# +------------------------------------4--------------------------------------*/

- name:                                 "SCR Log Function - Route: index / {{ action }}"
  ansible.builtin.include_tasks:
    file:                               roles-scr/scr_log_function/tasks/index.yaml
  when:                                 activity == "index"

- name:                                 "SCR Log Function - Route: log_summary / {{ action }}"
  ansible.builtin.include_tasks:
    file:                               roles-scr/scr_log_function/tasks/log_summary.yaml
  when:                                 activity == "log_summary"

- name:                                 "SCR Log Function - Route: log_detail / {{ action }}"
  ansible.builtin.include_tasks:
    file:                               roles-scr/scr_log_function/tasks/log_detail.yaml
  when:                                 activity == "log_detail"

- name:                                 "SCR Log Function - Route: object / {{ action }}"
  ansible.builtin.include_tasks:
    file:                               roles-scr/scr_log_function/tasks/object.yaml
  when:                                 activity == "object"

- name:                                 "SCR Log Function - Route: file / {{ action }}"
  ansible.builtin.include_tasks:
    file:                               roles-scr/scr_log_function/tasks/file.yaml
  when:                                 activity == "file"

---
# initialize_update.yaml
# Update the global index. Three target sub-actions, each gated on
# payload.target:
#
#   payload.target = run   → set status + end_date on current Run
#   payload.target = job   → set status on current Job
#   payload.target = step  → advance current Job's last_completed_step
#                             to max(existing, payload.step)
#
# All tasks here are gated by `when: action == 'update'`.
#
# Required vars: scr_job_id (always); scr_run_id (target=run only);
#                payload.target; payload.status (run|job) or payload.step (step).

# -----------------------------------------------------------------------------
# Find current Job (needed for every update target)
# -----------------------------------------------------------------------------
- name:                                 "SCR Log Function [index/update] - Find current job"
  ansible.builtin.set_fact:
    _scr_current_job: >-
                                        {{ (_scr_index.jobs
                                           | selectattr('job_id', 'equalto', scr_job_id | int)
                                           | list
                                           | first)
                                           | default({}) }}
  when:                                 action == 'update'

- name:                                 "SCR Log Function [index/update] - Fail if current job not in index"
  ansible.builtin.fail:
    msg: >-
                                        "[index/update] Job '{{ scr_job_id }}' not found in global index.
                                        Available job_ids: {{ _scr_index.jobs | map(attribute='job_id') | list }}"
  when:
    - action == 'update'
    - _scr_current_job | length == 0


# -----------------------------------------------------------------------------
# TARGET = run  → update current run's status + end_date
# -----------------------------------------------------------------------------
- name:                                 "SCR Log Function [index/update run] - Init current-run lookup"
  ansible.builtin.set_fact:
    _scr_current_run:                   {}
  when:
    - action == 'update'
    - payload.target == 'run'

- name:                                 "SCR Log Function [index/update run] - Find current run (cast run_id to int both sides)"
  ansible.builtin.set_fact:
    _scr_current_run:                   "{{ item }}"
  loop:                                 "{{ _scr_current_job.runs | default([]) }}"
  loop_control:
    label:                              "run_id={{ item.run_id | default('?') }}"
  when:
    - action == 'update'
    - payload.target == 'run'
    - (item.run_id | int) == (scr_run_id | int)

- name:                                 "SCR Log Function [index/update run] - Fail if current run not in current job"
  ansible.builtin.fail:
    msg: >-
                                        "[index/update run] Run '{{ scr_run_id }}' not found in job '{{ scr_job_id }}'.
                                        Available run_ids: {{ _scr_current_job.runs | map(attribute='run_id') | list }}"
  when:
    - action == 'update'
    - payload.target == 'run'
    - _scr_current_run | length == 0

- name:                                 "SCR Log Function [index/update run] - Rebuild index with updated run"
  ansible.builtin.set_fact:
    _scr_index_updated:
      last_job_number:                  "{{ _scr_index.last_job_number }}"
      jobs: >-
                                        {{ (_scr_index.jobs
                                           | rejectattr('job_id', 'equalto', _scr_current_job.job_id)
                                           | list)
                                           + [_scr_current_job | combine({
                                               'runs': (_scr_current_job.runs
                                                        | rejectattr('run_id', 'equalto', _scr_current_run.run_id)
                                                        | list)
                                                       + [_scr_current_run | combine({
                                                              'run_id':   _scr_current_run.run_id | int,
                                                              'status':   payload.status,
                                                              'end_date': lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%SZ')
                                                            })]
                                             })]
                                        }}
  when:
    - action == 'update'
    - payload.target == 'run'


# -----------------------------------------------------------------------------
# TARGET = job  → update current job's status
# -----------------------------------------------------------------------------
- name:                                 "SCR Log Function [index/update job] - Rebuild index with updated job status"
  ansible.builtin.set_fact:
    _scr_index_updated:
      last_job_number:                  "{{ _scr_index.last_job_number }}"
      jobs: >-
                                        {{ (_scr_index.jobs
                                           | rejectattr('job_id', 'equalto', _scr_current_job.job_id)
                                           | list)
                                           + [_scr_current_job | combine({'status': payload.status})]
                                        }}
  when:
    - action == 'update'
    - payload.target == 'job'


# -----------------------------------------------------------------------------
# TARGET = step → advance last_completed_step to max(existing, payload.step)
# -----------------------------------------------------------------------------
- name:                                 "SCR Log Function [index/update step] - Rebuild index with advanced checkpoint"
  ansible.builtin.set_fact:
    _scr_index_updated:
      last_job_number:                  "{{ _scr_index.last_job_number }}"
      jobs: >-
                                        {{ (_scr_index.jobs
                                           | rejectattr('job_id', 'equalto', _scr_current_job.job_id)
                                           | list)
                                           + [_scr_current_job | combine({
                                               'last_completed_step': [_scr_current_job.last_completed_step | default(0) | int,
                                                                       payload.step | int] | max
                                             })]
                                        }}
  when:
    - action == 'update'
    - payload.target == 'step'

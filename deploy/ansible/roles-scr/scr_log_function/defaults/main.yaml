---
# defaults for scr_log_function role
scr_log_function_objectstore_file:        "object_store.json"


# Local directory for log files on the controller and target systems
scr_log_function_local_basedir:           "{{ scr_basedir }}"
scr_log_function_local_log_dir:           "{{ scr_log_function_local_basedir }}/logs"
scr_log_function_local_filestore_dir:     "{{ scr_log_function_local_basedir }}/FILE_STORE"
scr_log_function_local_objectstore:       "{{ scr_log_function_local_basedir }}/{{ scr_log_function_objectstore_file }}"


# Azure Storage account/container locations
#   Global run index — fixed path, shared across all runs
scr_log_function_index_blob:              "scr-runs/scr_global_index.json"

#   Blob path prefixes inside the tfstate container
#     logs/        → summary and detail log files (written by log_summary / log_detail)
#     FILE_STORE/   → arbitrary files uploaded by the file activity
#     OBJECT_STORE → Ansible facts stored in JSON object (written by object store/update)
scr_log_function_remote_basedir:          "scr-runs/{{ scr_run_id | default('unknown') }}"
scr_log_function_remote_log_dir:          "{{ scr_log_function_remote_basedir }}/logs"
scr_log_function_remote_filestore_dir:    "{{ scr_log_function_remote_basedir }}/FILE_STORE"
scr_log_function_remote_objectstore:      "{{ scr_log_function_remote_basedir }}/{{ scr_log_function_objectstore_file }}"


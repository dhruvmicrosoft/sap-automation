# Commandline calling for testing:
# ansible-playbook  --inventory    x_scr_testing_inventory_X90.yaml          \
#                   --inventory    x_scr_testing_inventory_X91.yaml          \
#                   --extra-vars   "scr_source_sid=X90 scr_dest_sid=X91"    \
#                   playbook_scr_initialize.yaml                             \
#                   -vvv
#
# Run individual stages using tags:
#   --tags logging      Step 1   (write summary log header, log STEP 1)
#   --tags secrets      Step 2   (pull Key Vault SSH credentials, log STEP 2)
#   --tags discovery    Step 4   (system discovery on all hosts)
#   --tags fetch        Step 5   (fetch reports to controller, log STEP 4-5)
#   --tags kernel       Steps 6-9 (SAP kernel inventory, compare, reports)
#   --tags upload       Step 3 / post_tasks (log to Azure, upload artifacts)
#   --tags cleanup      Cleanup  (remove temp SSH key files)
#
# Combine tags to run a subset, e.g.:
#   --tags "secrets,discovery"

---
# /*----------------------------------------------------------------------------8
# |                                                                            |
# |      SCR Initialize — Register, Log, Secrets, Discovery, Upload           |
# |                                                                            |
# |  Steps:                                                                   |
# |    1. Register run in global index (scr_run_id = 0001, 0002 …)            |
# |    2. Pull SSH credentials from Key Vault (scr_keys)   [tag: secrets]     |
# |    3. Run system discovery on source + destination      [tag: discovery]   |
# |    5. Fetch discovery reports to controller             [tag: fetch]       |
# |    6. SAP kernel inventory on source + destination      [tag: kernel]      |
# |    7. SAP kernel compare (source vs target)             [tag: kernel]      |
# |    8. Write kernel sync report                          [tag: kernel]      |
# |    9. Store kernel sync state to objectstore            [tag: kernel]      |
# |   10. Append discovery + kernel report to detail log    [tag: fetch]       |
# |   11. Mark run Completed-Success in global index        [tag: cleanup]     |
# |   12. Clean up temp SSH key files                       [tag: cleanup]     |
# |                                                                            |
# +---------------------------------------------------------------------------*/
- hosts:                                "{{ scr_source_sid | upper }}_PAS :
                                         {{ scr_source_sid | upper }}_DB  :
                                         {{ scr_dest_sid   | upper }}_PAS :
                                         {{ scr_dest_sid   | upper }}_DB"

  name:                                 "SCR Initialize"
  gather_facts:                         false
  any_errors_fatal:                     false    # a discovery failure on one host must not stop all others
  strategy:                             linear   # required: makes run_once behaviour deterministic

  # scr_source_sid and scr_dest_sid MUST be passed via --extra-vars at runtime.
  # They are resolved before hosts: is evaluated, which is why they cannot come
  # from role defaults — extra-vars is the only source available that early.

  vars_files:
    - roles-scr/scr_common/defaults/main.yaml    # loads scr_log_dir, scr_azure_*, etc.
    - x_scr_parameters.yaml                      # loads scr_azure_resource_group, etc.


# /*---------------------------------------------------------------------------8
# |                                                                            |
# |   PRE-TASKS                                                                |
# |     1. Write initial log entry to controller                               |
# |     2. Pull Key Vault SSH credentials (scr_keys role)                      |
# |     3. Upload initial log to Azure Blob Storage                            |
# |                                                                            |
# +------------------------------------4--------------------------------------*/
  pre_tasks:

    # -----------------------------------------------------------------------
    # Step 1 — Gather controller datetime, create log dir, register this run
    #          in the global index (sets scr_run_id), write summary log header.
    # -----------------------------------------------------------------------
    - name:                             "Controller - Gather facts for timestamps"  # noqa: run-once[task]
      ansible.builtin.setup:
      delegate_to:                      localhost
      run_once:                         true
      tags:                             [logging, always]

    - name:                             "Controller - Create SCR log directory"  # noqa: run-once[task]
      ansible.builtin.file:
        path:                           "{{ scr_log_dir }}"
        state:                          directory
        mode:                           "0755"
      delegate_to:                      localhost
      run_once:                         true
      tags:                             [logging]

    - name:                             "LOG - Register SCR run in global index"  # noqa: run-once[task]
      ansible.builtin.include_role:
        name:                           roles-scr/scr_log_function
      vars:
        activity:                       index
        action:                         register
        payload_message:
          activity:                     SCR
          source_sid:                   "{{ scr_source_sid }}"
          dest_sid:                     "{{ scr_dest_sid }}"
      run_once:                         true
      tags:                             [logging, always]

    # scr_run_id is set on localhost by index/register above.
    # Broadcast it to every host so all tasks use the correct run-scoped blob path.
    - name:                             "Controller - Broadcast scr_run_id to all hosts"
      ansible.builtin.set_fact:
        scr_run_id:                     "{{ lookup('file', scr_log_dir + '/.scr_run_id') }}"
      tags:                             [logging, always]


    - name:                             "Controller - Write summary log header"  # noqa: run-once[task]
      ansible.builtin.copy:
        dest:                           "{{ scr_log_dir }}/{{ scr_run_id }}_summary.log"
        mode:                           "0644"
        content: |
          ============================================================
          SCR INITIALIZE — RUN STARTED
          ============================================================
          Run ID  : {{ scr_run_id }}
          Source  : {{ scr_source_sid }}
          Target  : {{ scr_dest_sid }}
          Started : {{ ansible_date_time.iso8601 }}
          ============================================================

      delegate_to:                      localhost
      run_once:                         true
      tags:                             [logging]

    - name:                             "LOG - STEP 1: Logging initialized"  # noqa: run-once[task]
      ansible.builtin.include_role:
        name:                           roles-scr/scr_log_function
      vars:
        activity:                       log_summary
        action:                         store
        payload_message:                "STEP 1 : Logging initialized"
      run_once:                         true
      tags:                             [logging]


    # -----------------------------------------------------------------------
    # Step 2 — Pull SSH credentials from Key Vault using MSI.
    #          Based directly on colleague's playbook_scr_mkd_testing1.yaml.
    #          No client secret required — managed identity handles auth.
    # -----------------------------------------------------------------------
    - name:                             "Source - Get SSH credentials from Key Vault"
      ansible.builtin.include_role:
        name:                           roles-scr/scr_keys
      vars:
        function:                       "source"
        granularity:                    "workload"
        kv_name:                        "{{ lookup('vars', 'scr_' + function + '_kv_name') }}"
        prefix:                         "{{ lookup('vars', 'scr_' + function + '_prefix' ) }}"
      when:
        - (vars['scr_' + function + '_sid'] | upper) + '_PAS' in vars['group_names'] or
          (vars['scr_' + function + '_sid'] | upper) + '_DB'  in vars['group_names']
      tags:                             [secrets]

    - name:                             "Destination - Get SSH credentials from Key Vault"
      ansible.builtin.include_role:
        name:                           roles-scr/scr_keys
      vars:
        function:                       "dest"
        granularity:                    "workload"
        kv_name:                        "{{ lookup('vars', 'scr_' + function + '_kv_name') }}"
        prefix:                         "{{ lookup('vars', 'scr_' + function + '_prefix' ) }}"
      when:
        - (vars['scr_' + function + '_sid'] | upper) + '_PAS' in vars['group_names'] or
          (vars['scr_' + function + '_sid'] | upper) + '_DB'  in vars['group_names']
      tags:                             [secrets]


    - name:                             "LOG - STEP 2: Key Vault secrets retrieved"  # noqa: run-once[task]
      ansible.builtin.include_role:
        name:                           roles-scr/scr_log_function
      vars:
        activity:                       log_summary
        action:                         store
        payload_message:                "STEP 2 : Key Vault secrets retrieved"
      run_once:                         true
      tags:                             [secrets]


# /*---------------------------------------------------------------------------8
# |                                                                            |
# |   TASKS                                                                    |
# |     4. System discovery — runs in parallel across all hosts                |
# |     5. Fetch per-host reports to controller + append to main log           |
# |                                                                            |
# +------------------------------------4--------------------------------------*/
  tasks:

    # -----------------------------------------------------------------------
    # Step 3a — Remove old discovery reports from each remote host's /tmp/.
    #           Without this, previous run files would be fetched again and
    #           appended a second time to the detail log.
    # -----------------------------------------------------------------------
    - name:                             "Host - Remove stale discovery reports from /tmp"
      ansible.builtin.shell:            "rm -f /tmp/scr_discovery_*.txt /tmp/scr_discovery_*.md"
      changed_when:                     false
      tags:                             [discovery, fetch]

    # -----------------------------------------------------------------------
    # Step 4b — Discovery runs on each host independently and in parallel.
    #           Results are written to /tmp/scr_discovery_*.txt on each host.
    #           ignore_errors ensures one host failing doesn't block the rest.
    # -----------------------------------------------------------------------
    - name:                             "Source - System Discovery"
      ansible.builtin.include_role:
        name:                           roles-scr/scr_system_discovery
      vars:
        scr_discovery_system_role:      "source"
        scr_discovery_sid:              "{{ scr_source_sid }}"
      when:
        - (scr_source_sid | upper + '_PAS') in vars['group_names'] or
          (scr_source_sid | upper + '_DB')  in vars['group_names']
      ignore_errors:                    true
      register:                         _source_discovery_result
      tags:                             [discovery]

    - name:                             "Destination - System Discovery"
      ansible.builtin.include_role:
        name:                           roles-scr/scr_system_discovery
      vars:
        scr_discovery_system_role:      "target"
        scr_discovery_sid:              "{{ scr_dest_sid }}"
      when:
        - (scr_dest_sid | upper + '_PAS') in vars['group_names'] or
          (scr_dest_sid | upper + '_DB')  in vars['group_names']
      ignore_errors:                    true
      register:                         _dest_discovery_result
      tags:                             [discovery]


    # -----------------------------------------------------------------------
    # Step 5b — Find and fetch discovery reports from each remote host.
    #           Files land in scr_log_dir on the controller, named by host.
    # -----------------------------------------------------------------------
    - name:                             "Host - Find discovery report files in /tmp"
      ansible.builtin.find:
        paths:                          "/tmp"
        patterns:                       "scr_discovery_*.txt"
      register:                         _scr_discovery_reports
      tags:                             [fetch]

    - name:                             "Controller - Fetch each discovery report"
      ansible.builtin.fetch:
        src:                            "{{ item.path }}"
        dest:                           "{{ scr_log_dir }}/scr_discovery_{{ inventory_hostname }}_{{ item.path | basename }}"
        flat:                           true
        fail_on_missing:                true
      loop:                             "{{ _scr_discovery_reports.files }}"
      when:                             _scr_discovery_reports.files | length > 0
      tags:                             [fetch]

    # -----------------------------------------------------------------------
    # Step 5c — Append per-host discovery outcome to the main log.
    #           Shows 'completed' or 'FAILED' so the log is self-describing.
    # -----------------------------------------------------------------------
    - name:                             "LOG - STEP 4: Discovery result"
      ansible.builtin.include_role:
        name:                           roles-scr/scr_log_function
      vars:
        activity:                       log_summary
        action:                         store
        payload_message: >-
          STEP 4 : Discovery
          {{ 'FAILED' if ((_source_discovery_result is defined and _source_discovery_result is failed)
                       or (_dest_discovery_result   is defined and _dest_discovery_result   is failed))
             else 'completed' }} — {{ inventory_hostname }}
      tags:                             [fetch]

    - name:                             "LOG - STEP 5: Discovery reports fetched"  # noqa: run-once[task]
      ansible.builtin.include_role:
        name:                           roles-scr/scr_log_function
      vars:
        activity:                       log_summary
        action:                         store
        payload_message:                "STEP 5 : Discovery reports fetched to controller"
      run_once:                         true
      tags:                             [fetch]


    # -----------------------------------------------------------------------
    # Steps 6-7 — SAP Kernel inventory on source + destination hosts, then
    #             compare.
    # -----------------------------------------------------------------------
    - name:                             "Source - Inventory SAP Kernel Files"
      ansible.builtin.include_role:
        name:                           roles-scr/scr_kernel
      vars:
        function:                       "inventory"
        kernel:                         "sap"
        sapsid:                         "{{ scr_source_sid }}"
      when:
        - (sapsid | upper + '_PAS') in vars['group_names'] or
          (sapsid | upper + '_DB')  in vars['group_names']
      tags:                             [kernel]

    - name:                             "Destination - Inventory SAP Kernel Files"
      ansible.builtin.include_role:
        name:                           roles-scr/scr_kernel
      vars:
        function:                       "inventory"
        kernel:                         "sap"
        sapsid:                         "{{ scr_dest_sid }}"
      when:
        - (sapsid | upper + '_PAS') in vars['group_names'] or
          (sapsid | upper + '_DB')  in vars['group_names']
      tags:                             [kernel]

    - name:                             "LOG - STEP 6: SAP kernel inventory completed"  # noqa: run-once[task]
      ansible.builtin.include_role:
        name:                           roles-scr/scr_log_function
      vars:
        activity:                       log_summary
        action:                         store
        payload_message:                "STEP 6 : SAP kernel inventory completed — {{ inventory_hostname }}"
      run_once:                         true
      tags:                             [kernel]

    - name:                             "Compare - SAP Kernel Files"
      ansible.builtin.include_role:
        name:                           roles-scr/scr_kernel
      vars:
        function:                       "compare"
        kernel:                         "sap"
      run_once:                         true
      tags:                             [kernel]

    - name:                             "LOG - STEP 7: SAP kernel comparison completed"  # noqa: run-once[task]
      ansible.builtin.include_role:
        name:                           roles-scr/scr_log_function
      vars:
        activity:                       log_summary
        action:                         store
        payload_message:                "STEP 7 : SAP kernel comparison completed"
      run_once:                         true
      tags:                             [kernel]

    # -----------------------------------------------------------------------
    # Step 8 — Write the kernel sync report to the controller log directory.
    #          Sections: COPY, OVERWRITE, REMOVE  (MATCH items omitted).
    #          Uploaded to Azure in post_tasks via scr_log_function file/store.
    # -----------------------------------------------------------------------
    - name:                             "Controller - Write kernel sync report"  # noqa: run-once[task]
      ansible.builtin.copy:
        dest:                           "{{ scr_log_dir }}/kernel_sync_report_{{ scr_source_sid }}_to_{{ scr_dest_sid }}.log"
        mode:                           "0644"
        content:                        "{{ lookup('template', 'roles-scr/scr_kernel/templates/kernel_sync_report.j2') }}"
      delegate_to:                      localhost
      run_once:                         true
      tags:                             [kernel]

    - name:                             "LOG - STEP 8: Kernel sync report written"  # noqa: run-once[task]
      ansible.builtin.include_role:
        name:                           roles-scr/scr_log_function
      vars:
        activity:                       log_summary
        action:                         store
        payload_message:                "STEP 8 : Kernel sync report written — kernel_sync_report_{{ scr_source_sid }}_to_{{ scr_dest_sid }}.log"
      run_once:                         true
      tags:                             [kernel]

    # -----------------------------------------------------------------------
    # Step 9 — Build kernel sync state fact and persist it to Azure
    #          objectstore as scr_kernel_sync_state.json.
    #          Load this object to resume or abort an SCR without re-running
    #          the inventory + compare steps.
    # -----------------------------------------------------------------------
    - name:                             "Controller - Build kernel sync state fact"  # noqa: run-once[task]
      ansible.builtin.set_fact:
        scr_kernel_sync_state:
          run_id:                       "{{ scr_run_id }}"
          source_sid:                   "{{ scr_source_sid }}"
          dest_sid:                     "{{ scr_dest_sid }}"
          generated:                    "{{ ansible_date_time.iso8601 }}"
          kernel_sync_state:
            match:                      "{{ hostvars['localhost']['scr_matches']           | default([]) | sort }}"
            copy_from_source:           "{{ hostvars['localhost']['scr_missing_on_target'] | default([]) | sort }}"
            overwrite_from_source:      "{{ hostvars['localhost']['scr_changed']           | default([]) | sort }}"
            remove_from_target:         "{{ hostvars['localhost']['scr_extra_on_target']   | default([]) | sort }}"
      delegate_to:                      localhost
      run_once:                         true
      tags:                             [kernel]

    - name:                             "LOG - STEP 9: Store kernel sync state to objectstore"  # noqa: run-once[task]
      ansible.builtin.include_role:
        name:                           roles-scr/scr_log_function
      vars:
        activity:                       object
        action:                         store
        payload_message:                scr_kernel_sync_state
      run_once:                         true
      tags:                             [kernel]

    - name:                             "LOG - STEP 9: Kernel sync state stored"  # noqa: run-once[task]
      ansible.builtin.include_role:
        name:                           roles-scr/scr_log_function
      vars:
        activity:                       log_summary
        action:                         store
        payload_message:                "STEP 9 : Kernel sync state stored to objectstore — scr_kernel_sync_state.json"
      run_once:                         true
      tags:                             [kernel]


# /*---------------------------------------------------------------------------8
# |                                                                            |
# |   POST-TASKS                                                               |
# |     Runs only after ALL hosts have completed their tasks section.          |
#     5. Append discovery reports to detail log; upload kernel sync report     |
# |     6. Remove temp SSH key files from controller                           |
# |                                                                            |
# +------------------------------------4--------------------------------------*/
  post_tasks:

    # -----------------------------------------------------------------------
    # Step 5 final — All hosts done; append discovery reports and kernel sync
    #               report to the detail log.
    # -----------------------------------------------------------------------
    - name:                             "Controller - Find fetched discovery reports"  # noqa: run-once[task]
      ansible.builtin.find:
        paths:                          "{{ scr_log_dir }}"
        patterns:                       "scr_discovery_*.txt"
        recurse:                        false
      register:                         _scr_discovery_txt_files
      delegate_to:                      localhost
      run_once:                         true
      tags:                             [fetch, upload]

    - name:                             "LOG - Append discovery reports to detail log"  # noqa: run-once[task]
      ansible.builtin.include_role:
        name:                           roles-scr/scr_log_function
      vars:
        activity:                       log_detail
        action:                         store
        payload_type:                   file_content
        payload_message:                "{{ _scr_discovery_txt_files.files | map(attribute='path') | list }}"
      run_once:                         true
      when:                             _scr_discovery_txt_files.files | length > 0
      tags:                             [fetch, upload]

    - name:                             "LOG - Append kernel sync report to detail log"  # noqa: run-once[task]
      ansible.builtin.include_role:
        name:                           roles-scr/scr_log_function
      vars:
        activity:                       log_detail
        action:                         store
        payload_type:                   file_content
        payload_message:                "{{ scr_log_dir }}/kernel_sync_report_{{ scr_source_sid }}_to_{{ scr_dest_sid }}.log"
      run_once:                         true
      tags:                             [fetch, upload]

    # -----------------------------------------------------------------------
    # Step 5 — Mark run complete in the global index.
    # -----------------------------------------------------------------------
    - name:                             "LOG - Mark run completed"  # noqa: run-once[task]
      ansible.builtin.include_role:
        name:                           roles-scr/scr_log_function
      vars:
        activity:                       index
        action:                         update
        payload_message:                "Completed-Success"
      run_once:                         true
      tags:                             [cleanup]

    # -----------------------------------------------------------------------
    # Step 6 — Remove the temp SSH key files that scr_keys wrote to /tmp.
    # -----------------------------------------------------------------------
    - name:                             "Source - Cleanup SSH credential files"
      ansible.builtin.include_role:
        name:                           roles-scr/scr_keys
      vars:
        cleanup:                        true
        function:                       "source"
      when:
        - (vars['scr_' + function + '_sid'] | upper) + '_PAS' in vars['group_names'] or
          (vars['scr_' + function + '_sid'] | upper) + '_DB'  in vars['group_names']
      tags:                             [cleanup]

    - name:                             "Destination - Cleanup SSH credential files"
      ansible.builtin.include_role:
        name:                           roles-scr/scr_keys
      vars:
        cleanup:                        true
        function:                       "dest"
      when:
        - (vars['scr_' + function + '_sid'] | upper) + '_PAS' in vars['group_names'] or
          (vars['scr_' + function + '_sid'] | upper) + '_DB'  in vars['group_names']
      tags:                             [cleanup]

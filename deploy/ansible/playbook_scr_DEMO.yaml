# Commandline calling for testing:
# ansible-playbook  --inventory  x_scr_testing_inventory_X90.yaml     \
#                   --inventory  x_scr_testing_inventory_X91.yaml     \
#                   --extra-vars @x_scr_parameters.yaml               \
#                   playbook_scr_MKD_main.yaml                        \
#                   -v

---
# /*----------------------------------------------------------------------------8
# |                                                                            |
# |           Play for performing SAP System Copy tasks on Source              |
# |                                                                            |
# +------------------------------------4--------------------------------------*/
- name:                                 "SCR: Main Playbook for MKD Testing - Source System Tasks"
  hosts:                                "{{ scr_source_sid | upper }}_PAS :
                                         {{ scr_source_sid | upper }}_DB  :
                                         {{ scr_dest_sid   | upper }}_PAS :
                                         {{ scr_dest_sid   | upper }}_DB"

  gather_facts:                         false                                    # Important to collect hostvars information
  any_errors_fatal:                     true

  vars:
    # If you're using a user-assigned managed identity, set this:
    # msi_client_id:                      "<user-assigned-mi-client-id>"          # optional

  vars_files:
    - roles-scr/scr_common/defaults/main.yaml                                   # loads scr_log_dir, scr_azure_*, etc.


  pre_tasks:

    # =======================================================================
    # LOGGING / RUN-REGISTRATION  (same pattern as playbook_scr_initialize.yaml)
    # -----------------------------------------------------------------------
    # Step A — Gather facts on the controller (timestamps), truncate the
    #          per-run ansible log, ensure the local log directory exists.
    # Step B — Register this run in the global SCR index via
    #          scr_log_function/initialize/register. That assigns the
    #          scr_job_id and scr_run_id on the run_once host
    #          (ansible_play_hosts[0]). Broadcast to all DB hosts so the
    #          per-host backup tasks land in the right run_<id>/ folder.
    # Step C — Write the summary log header and log STEP 1 ("Logging
    #          initialized") so the run shows up in summary + detail logs.
    # =======================================================================

# STEP A: Gather facts, truncate ansible log, ensure local log directory exists
    - name:                             "Controller - Gather facts for timestamps"  # noqa: run-once[task]
      ansible.builtin.setup:
      delegate_to:                      localhost
      run_once:                         true
      tags:                             [logging, always]


    # Truncate the ansible log file so this run starts fresh. Must be done
    # in-place (same inode) so ansible's open log handle keeps writing to it.
    - name:                             "Controller - Truncate ansible run log (in place)"  # noqa: run-once[task]
      ansible.builtin.shell:            ": > /tmp/scr_ansible_run.log"
      delegate_to:                      localhost
      run_once:                         true
      changed_when:                     false
      tags:                             [logging, always]


    - name:                             "Controller - Create SCR log directory"  # noqa: run-once[task]
      ansible.builtin.file:
        path:                           "{{ scr_log_dir }}"
        state:                          directory
        mode:                           "0755"
      delegate_to:                      localhost
      run_once:                         true
      tags:                             [logging]



# STEP B: Register this run in the global SCR index via scr_log_function/initialize/register
    - name:                             "LOG - Register SCR run in global index"  # noqa: run-once[task]
      ansible.builtin.include_role:
        name:                           roles-scr/scr_log_function
      vars:
        activity:                       initialize
        action:                         register
        payload:
          activity:                     SCR_DB_BACKUP
          source_sid:                   "{{ scr_source_sid }}"
          dest_sid:                     "{{ scr_dest_sid }}"
      run_once:                         true
      tags:                             [logging, always]


    # scr_job_id, scr_run_id, and scr_resume_from_step are set on the run_once
    # host (ansible_play_hosts[0]) by initialize/register. Broadcast to all
    # play hosts so the per-host backup_database.yaml tasks read the same IDs
    # and upload into scr-runs/job_<id>/run_<id>/FILE_STORE/<host>/...
    - name:                             "Controller - Broadcast scr_job_id, scr_run_id, scr_resume_from_step to all hosts"
      ansible.builtin.set_fact:
        scr_job_id:                     "{{ hostvars[ansible_play_hosts[0]]['scr_job_id'] }}"
        scr_run_id:                     "{{ hostvars[ansible_play_hosts[0]]['scr_run_id'] }}"
        scr_resume_from_step:           "{{ hostvars[ansible_play_hosts[0]]['scr_resume_from_step'] | int }}"
      tags:                             [logging, always]



# STEP C: Write the summary log header and log STEP 1 ("Logging initialized")
    - name:                             "Controller - Write summary log header"  # noqa: run-once[task]
      ansible.builtin.copy:
        dest:                           "{{ scr_log_dir }}/{{ scr_job_id }}_summary.log"
        mode:                           "0644"
        content: |
          ============================================================
          SCR DB BACKUP - RUN STARTED
          ============================================================
          Job ID  : {{ scr_job_id }}
          Run ID  : {{ scr_run_id }}
          Source  : {{ scr_source_sid }}
          Target  : {{ scr_dest_sid }}
          DB SID  : {{ db_sid }}
          Started : {{ ansible_date_time.iso8601 }}
          ============================================================

      delegate_to:                      localhost
      run_once:                         true
      tags:                             [logging]

    - name:                             "LOG - STEP 1: Logging initialized"  # noqa: run-once[task]
      ansible.builtin.include_role:
        name:                           roles-scr/scr_log_function
      vars:
        activity:                       log_summary
        action:                         store
        payload:                        "STEP 1 : Logging initialized for SCR_DB_BACKUP run"
      run_once:                         true
      tags:                             [logging]


    # /*---------------------------------------------------------------------------8
    # |                                                                            |
    # |                        Retrieve KeyVault Secrets                           |
    # |                                                                            |
    # +------------------------------------4--------------------------------------*/
    # Added ansible-galaxy collection install of azure.azcollection to configure_deployer.sh
    # Added ansible-galaxy collection install of azure.azcollection to configure_deployer.sh.tmpl
    - name:
      import_tasks:                     tasks/scr_pre_tasks_ssh_keys.yaml



# -------------------------------------+---------------------------------------8
#
# Build the list of tasks to be executed in order here.
#
# -------------------------------------+---------------------------------------8
# Connection test using the fetched SSH credentials to ensure we can connect to
# the target systems before proceeding with the inventory and comparison steps.
# This can help catch any issues with the credentials early on before we get
# into the more time-consuming tasks.
  tasks:
    - name:                             Ping using the fetched key
      ansible.builtin.ping:


# -------------------------------------+---------------------------------------8
#
# SAP KERNEL
#
# -------------------------------------+---------------------------------------8
    - name:
      include_tasks:                    tasks/scr_sap_kernel.yaml

    - name:                             "LOG - STEP [KERNEL-SAP-SYNC]: SAP kernel synchronization completed"  # noqa: run-once[task]
      ansible.builtin.include_role:
        name:                           roles-scr/scr_log_function
      vars:
        activity:                       log_summary
        action:                         store
        payload:                        "STEP [KERNEL-SAP-SYNC] : SAP kernel synchronization completed — {{ inventory_hostname }}"
        sapsid:                         "{{ scr_dest_sid }}"
      # run_once:                         true
      tags:                             [kernel]
      when:                             
        - (sapsid | upper + '_PAS') in vars['group_names']


    # - ansible.builtin.set_fact:
    #     scr_run_id:                     0058






    # - name:                             "Dest - Initialize SAP parameters for SID"
    #   include_role:
    #     name:                           roles-scr/scr_sap_utility
    #   vars:
    #     function:                       "init"                                                      #
    #     type:                           "sap"                                                       # sap or db (hana, oracle, etc.)
    #     sapsid:                         "{{ scr_dest_sid }}"                                        # SID
    #   when:                             
    #     - (sapsid | upper + '_PAS') in vars['group_names'] or
    #       (sapsid | upper + '_DB')  in vars['group_names']                                          # source or destination groups



    - name:                             "Dest - Stop SAP Application for SID"
      include_role:
        name:                           roles-scr/scr_sap_utility
      vars:
        function:                       "stopsap"                                                      #
        type:                           "sap"                                                       # sap or db (hana, oracle, etc.)
        sapsid:                         "{{ scr_dest_sid }}"                                        # SID
      when:                             
        - (sapsid | upper + '_PAS') in vars['group_names'] or
          (sapsid | upper + '_DB')  in vars['group_names']                                          # source or destination groups





    - name:                             "Dest - Synchronize SAP Kernel Files for SID"
      include_role:
        name:                           roles-scr/scr_kernel
      vars:
        kernel:                         "sap"                                                       # sap or db (hana, oracle, etc.)
        function:                       "sync"                                                      #
        sapsid:                         "{{ scr_dest_sid }}"                                        # SID
      when:                             
        - (sapsid | upper + '_PAS') in vars['group_names'] or
          (sapsid | upper + '_DB')  in vars['group_names']                                          # source or destination groups






    # - meta:         end_play



    - name:                             "SCR DB Test - Fetch password + create backup user + run backup + upload"
      ansible.builtin.include_role:
        name:                           roles-scr/scr_db_backup
      when:                             
        - (scr_source_sid | upper + '_DB')  in vars['group_names']                                          # source or destination groups

    - name:                             "LOG - STEP 3: HANA backup + upload complete"  # noqa: run-once[task]
      ansible.builtin.include_role:
        name:                           roles-scr/scr_log_function
      vars:
        activity:                       log_summary
        action:                         store
        payload: >-
                                        STEP 3 : HANA backup taken and uploaded to
                                        scr-runs/job_{{ scr_job_id }}/run_{{ scr_run_id }}/FILE_STORE/<host>/DB_*/...
      run_once:                         true







# /*---------------------------------------------------------------------------8
# |  POST-TASKS                                                                |
# |    Final-status decision, run/job index update, ansible run log upload.    |
# |    Same shape as playbook_scr_initialize.yaml's post_tasks.                |
# +------------------------------------4--------------------------------------*/
  post_tasks:

    # -----------------------------------------------------------------------
    # Compute final run status:
    #   - ansible_play_hosts_all minus ansible_play_hosts = hosts that
    #     dropped out due to a failed task without ignore_errors.
    #   - any non-empty difference -> 'Failed' (retry-able).
    # -----------------------------------------------------------------------
    - name:                             "Controller - Compute final run status"  # noqa: run-once[task]
      ansible.builtin.set_fact:
        _scr_failed_hosts:              "{{ ansible_play_hosts_all | difference(ansible_play_hosts) | list }}"
      run_once:                         true
      tags:                             [cleanup, always]

    - name:                             "Controller - Set final run status string"  # noqa: run-once[task]
      ansible.builtin.set_fact:
        _scr_final_status: >-
                                        {{ 'Failed'
                                           if (_scr_failed_hosts | length > 0)
                                           else 'Completed-Success' }}
      run_once:                         true
      tags:                             [cleanup, always]

    - name:                             "LOG - Record failure summary in detail log"  # noqa: run-once[task]
      ansible.builtin.include_role:
        name:                           roles-scr/scr_log_function
      vars:
        activity:                       log_summary
        action:                         store
        payload: >-
                                        FAILURE : run ended with status {{ _scr_final_status }} —
                                        failed_hosts={{ _scr_failed_hosts | default([]) }}
      run_once:                         true
      when:                             _scr_final_status != 'Completed-Success'
      tags:                             [cleanup, always]

    - name:                             "LOG - Mark run completed"  # noqa: run-once[task]
      ansible.builtin.include_role:
        name:                           roles-scr/scr_log_function
      vars:
        activity:                       initialize
        action:                         update
        payload:
          target:                       run
          status:                       "{{ _scr_final_status }}"
      run_once:                         true
      tags:                             [cleanup, always]

    - name:                             "LOG - Mark job completed"  # noqa: run-once[task]
      ansible.builtin.include_role:
        name:                           roles-scr/scr_log_function
      vars:
        activity:                       initialize
        action:                         update
        payload:
          target:                       job
          status:                       "{{ _scr_final_status }}"
      run_once:                         true
      tags:                             [cleanup, always]

    # -----------------------------------------------------------------------
    # Upload the captured ansible run log (written by ANSIBLE_LOG_PATH)
    # to the run folder, identical to what playbook_scr_initialize.yaml does.
    # Run with:
    #   ANSIBLE_LOG_PATH=/tmp/scr_ansible_run.log ansible-playbook ...
    # -----------------------------------------------------------------------
    - name:                             "Controller - Locate ansible run log"  # noqa: run-once[task]
      ansible.builtin.set_fact:
        _scr_ansible_log_path:          "{{ lookup('env', 'ANSIBLE_LOG_PATH') | default('/tmp/scr_ansible_run.log', true) }}"
      delegate_to:                      localhost
      run_once:                         true
      tags:                             [cleanup, always]

    - name:                             "Controller - Stat ansible run log"  # noqa: run-once[task]
      ansible.builtin.stat:
        path:                           "{{ _scr_ansible_log_path }}"
      register:                         _scr_ansible_log_stat
      delegate_to:                      localhost
      run_once:                         true
      tags:                             [cleanup, always]

    - name:                             "Controller - Upload ansible run log to run folder"  # noqa: run-once[task]
      ansible.builtin.command: >-
                                        az storage blob upload
                                        --account-name   {{ scr_azure_storage_account }}
                                        --container-name {{ scr_azure_container }}
                                        --name           scr-runs/job_{{ scr_job_id }}/run_{{ scr_run_id }}/ansible_run.log
                                        --file           {{ _scr_ansible_log_path }}
                                        --overwrite
                                        --auth-mode      login
                                        --only-show-errors
      delegate_to:                      localhost
      run_once:                         true
      when:                             _scr_ansible_log_stat.stat.exists
      changed_when:                     true
      failed_when:                      false
      tags:                             [cleanup, always]

    - name:                             "Controller - Warn if ansible run log not found"  # noqa: run-once[task]
      ansible.builtin.debug:
        msg: >-
                                        ANSIBLE_LOG_PATH not set or file missing
                                        ({{ _scr_ansible_log_path }}); skipping run-log upload.
      delegate_to:                      localhost
      run_once:                         true
      when:                             not _scr_ansible_log_stat.stat.exists
      tags:                             [cleanup, always]

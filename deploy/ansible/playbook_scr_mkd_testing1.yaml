    #     verbosity:                      0




# # /*---------------------------------------------------------------------------8
# # |                                                                            |
# # |                         Clean Up Temp Key File                             |
# # |                                                                            |
# # +------------------------------------4--------------------------------------*/
  post_tasks:
    - name:                               "Source - Cleanup the SSH credential files from the OS"
      ansible.builtin.include_role:
        name:                             roles-scr/scr_keys
      vars:
        cleanup:                          true
        function:                         "source"
      when:                             
        - (vars['scr_' + function + '_sid'] | upper) + '_PAS' in vars['group_names'] or
          (vars['scr_' + function + '_sid'] | upper) + '_DB'  in vars['group_names']                # source or destination groups

    - name:                               "Destination - Cleanup the SSH credential files from the OS"
      ansible.builtin.include_role:
        name:                             roles-scr/scr_keys
      vars:
        cleanup:                          true
        function:                         "dest"
      when:                             
        - (vars['scr_' + function + '_sid'] | upper) + '_PAS' in vars['group_names'] or
          (vars['scr_' + function + '_sid'] | upper) + '_DB'  in vars['group_names']                # source or destination groups




































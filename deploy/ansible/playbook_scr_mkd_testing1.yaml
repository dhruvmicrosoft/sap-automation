---
# /*----------------------------------------------------------------------------8
# |                                                                            |
# |           Play for performing SAP System Copy tasks on Source              |
# |                                                                            |
# +------------------------------------4--------------------------------------*/
- hosts:                                "{{ scr_source_sid | upper }}_PAS :
                                         {{ scr_source_sid | upper }}_DB  :
                                         {{ scr_dest_sid   | upper }}_PAS :
                                         {{ scr_dest_sid   | upper }}_DB"

  name:                                 "SCR Source"
  gather_facts:                         false                                    # Important to collect hostvars information
  any_errors_fatal:                     true

  vars:
    # If you're using a user-assigned managed identity, set this:
    # msi_client_id:                      "<user-assigned-mi-client-id>"   # optional



# /*---------------------------------------------------------------------------8
# |                                                                            |
# |                        Retrieve KeyVault Secrets                           |
# |                                                                            |
# +------------------------------------4--------------------------------------*/
# Added ansible-galaxy collection install of azure.azcollection to configure_deployer.sh
# Added ansible-galaxy collection install of azure.azcollection to configure_deployer.sh.tmpl

  pre_tasks:
    - name:                             "Source - Get the SSH credentials for the SAP system from Key Vault"
      ansible.builtin.include_role:
        name:                           roles-scr/scr_keys
      vars:
        function:                       "source"                                                    # source or dest
        granularity:                    "workload"                                                  # workload | sid | host
        kv_name:                        "{{ lookup('vars', 'scr_' + function + '_kv_name') }}"      # scr_source_kv_name
        prefix:                         "{{ lookup('vars', 'scr_' + function + '_prefix' ) }}"      # scr_source_prefix
      when:                             
        - (vars['scr_' + function + '_sid'] | upper) + '_PAS' in vars['group_names'] or
          (vars['scr_' + function + '_sid'] | upper) + '_DB'  in vars['group_names']                # source or destination groups


    - name:                             "Destination - Get the SSH credentials for the SAP system from Key Vault"
      ansible.builtin.include_role:
        name:                           roles-scr/scr_keys
      vars:
        function:                       "dest"                                                      # source or dest
        granularity:                    "workload"                                                  # workload | sid | host
        kv_name:                        "{{ lookup('vars', 'scr_' + function + '_kv_name') }}"      # scr_source_kv_name
        prefix:                         "{{ lookup('vars', 'scr_' + function + '_prefix' ) }}"      # scr_source_prefix
      when:                             
        - (vars['scr_' + function + '_sid'] | upper) + '_PAS' in vars['group_names'] or
          (vars['scr_' + function + '_sid'] | upper) + '_DB'  in vars['group_names']                # source or destination groups



# -------------------------------------+---------------------------------------8
#
# Build the list of tasks to be executed in order here.
#
# -------------------------------------+---------------------------------------8
  tasks:
    - name:                             Ping using the fetched key
      ansible.builtin.ping:

    - name:                             "Source - Inventory SAP Kernel Files for SID"
      include_role:
        name:                           roles-scr/scr_kernel
      vars:
        function:                       "inventory"                                                 #
        kernel:                         "sap"                                                       # sap or db (hana, oracle, etc.)
        sapsid:                         "{{ scr_source_sid }}"                                      # SID
      when:                             
        - (sapsid | upper + '_PAS') in vars['group_names'] or
          (sapsid | upper + '_DB')  in vars['group_names']                  # source or destination groups


    - name:                             "Destination - Inventory SAP Kernel Files for SID"
      include_role:
        name:                           roles-scr/scr_kernel
      vars:
        function:                       "inventory"                                                 #
        kernel:                         "sap"                                                       # sap or db (hana, oracle, etc.)
        sapsid:                         "{{ scr_dest_sid }}"                                        # SID
      when:                             
        - (sapsid | upper + '_PAS') in vars['group_names'] or
          (sapsid | upper + '_DB')  in vars['group_names']                  # source or destination groups


    - name:                             "Destination - Compare SAP Kernel Files for SID"
      include_role:
        name:                           roles-scr/scr_kernel
      vars:
        function:                       "compare"                                                   #
        kernel:                         "sap"                                                       # sap or db (hana, oracle, etc.)
        # sapsid:                         "{{ scr_dest_sid }}"                                        # SID
      run_once:                         true
      # when:                             
      #   - (sapsid | upper + '_PAS') in vars['group_names'] or
      #     (sapsid | upper + '_DB')  in vars['group_names']                  # source or destination groups



# Database in progress, but commenting out for now to focus on SAP inventory first. Will add back in once we have the DB inventory tasks fleshed out and tested.

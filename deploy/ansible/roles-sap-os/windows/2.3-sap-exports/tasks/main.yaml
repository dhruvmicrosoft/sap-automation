---
- name:                                "2.3-sap-exports - Get the SCS Server name list"
  ansible.builtin.set_fact:
    scs_server_temp: "{{ scs_server_temp | default([]) + [item] }}"

  with_items:
    - "{{ query('inventory_hostnames', '{{ sap_sid | upper }}_SCS') }}"
    - "{{ query('inventory_hostnames', '{{ sap_sid | upper }}_DB') }}"

- name:                                "2.3-sap-exports - Set the SCS Server name"
  ansible.builtin.set_fact:
    scs_server: "{{ hostvars[scs_server_temp | first]['virtual_host'] }}"

- name:                                "2.3-sap-exports - Calculating the domain value from {{ domain_name }}"
  ansible.builtin.set_fact:
    domain:                            "{{ domain_name | split('.') | first }}"
    cacheable:                         true
  when:
    - domain_name is defined
    - domain_name | type_debug != 'NoneType'
    - domain_name | trim | length > 1
    - domain is not defined


- name:                                "2.3-sap-exports - Create SAP Directories"
  ansible.windows.win_dsc:
    resource_name:                     File
    DestinationPath:                   "{{ item.path }}"
    Type:                              Directory
    Ensure:                            Present
  loop:
    - { path: "{{ target_media_location_windows }}" }
  when:
    - node_tier == 'scs'

- name:                                "2.3-sap-exports - Enable Folder Sharing"
  ansible.windows.win_share:
    name:                              SAP
    description:                       Share Installation Files Across Servers
    path:                              "{{ target_media_location_windows }}"
    list:                              true
    full:                              '{{ orchestration_ansible_user }},SAP_{{ sap_sid | upper }}_LocalAdmin,{{ domain }}\SAP_{{ sap_sid | upper }}_GlobalAdmin,{{ domain_service_account }}@{{ domain_name }},{{ sql_svc_account }}'
    state:                             present
  register:                            win_share_info
  when:
    - node_tier == 'scs'

- name:                                "2.3-sap-exports - Show Share Output"
  ansible.builtin.debug:
    var:                               win_share_info
  when:
    - node_tier == 'scs'
...

# /*---------------------------------------------------------------------------8
# |                                                                            |
# |      Set Runtime Parameters - e.g Sub ID , Resource group name             |
# |                                                                            |
# +------------------------------------4--------------------------------------*/

# ----------------------------------------
# BEGIN
# ----------------------------------------


- name:                                "5.8 HANA Pacemaker Scale-out - Retrieve Subscription ID and Resource Group Name"
  ansible.builtin.uri:
    url:                               http://169.254.169.254/metadata/instance?api-version=2021-02-01
    use_proxy:                         false
    headers:
      Metadata:                        true
  register:                            hanavmmetadata

- name:                                "5.8 HANA Pacemaker Scale-out - Show Azure Instance Metadata results"
  ansible.builtin.debug:
    var:                               hanavmmetadata.json
    verbosity:                         2

- name:                                "5.8 HANA Pacemaker Scale-out - Extract Subscription ID"
  ansible.builtin.set_fact:
    fencing_spn_subscription_id:       "{{ hanavmmetadata.json.compute.subscriptionId }}"
  no_log:                              true

- name:                                "5.8 HANA Pacemaker Scale-out - Extract ResourceGroup Name"
  ansible.builtin.set_fact:
    resource_group_name:               "{{ hanavmmetadata.json.compute.resourceGroupName }}"
  no_log:                              true

- name:                                "5.8 HANA Pacemaker Scale-out - Get the primary and secondary network interface cards IP addresses"
  ansible.builtin.set_fact:
    primary_ip:                        "{{ hanavmmetadata.json.network.interface[0].ipv4.ipAddress[0].privateIpAddress }}"
    subnet_prefix:                     "{{ hanavmmetadata.json.network.interface[0].ipv4.subnet[0].prefix }}"

- name:                                "5.8 HANA Pacemaker Scale-out - Extract network interface IP addresses"
  ansible.builtin.set_fact:
    primary_instance_ip_db:            "{{ hostvars[primary_instance_name]['primary_ip'] | string }}"
    secondary_instance_ip_db:          "{{ hostvars[secondary_instance_name]['primary_ip'] | string }}"

# - name:                                Set the primary intance db nic and admin nic IP
#   ansible.builtin.set_fact:
#     primary_instance_ip_db:            "{{ hostvars[primary_instance_name]['ansible_eth0']['ipv4'][0]['address'] }}"

# - name:                                Set the secondary intance db nic and admin nic IP
#   ansible.builtin.set_fact:
#     secondary_instance_ip_db:          "{{ hostvars[secondary_instance_name]['ansible_eth0']['ipv4'][0]['address'] }}"

- name:                                "5.8 HANA Pacemaker Scale-out - Show Subscription ID"
  ansible.builtin.debug:
    var:                               fencing_spn_subscription_id
    verbosity:                         2

- name:                                "5.8 HANA Pacemaker Scale-out - Show Resource Group Name"
  ansible.builtin.debug:
    var:                               resource_group_name
    verbosity:                         2

- name:                                "5.8 HANA Pacemaker Scale-out - Ensure HANA DB version is checked and captured"
  when:                                node_tier == 'hana'
  block:
    - name:                            Check HANA DB Version and register
      become_user:                     "{{ db_sid | lower }}adm"
      become:                          true
      ansible.builtin.command:         /hana/shared/{{ db_sid | upper }}/HDB{{ db_instance_number }}/HDB version
      register:                        hdbversion
      changed_when:                    false

    - name:                            "5.8 HANA Pacemaker Scale-out - Capture the Hana DB version"
      ansible.builtin.set_fact:
        hdb_version:                   "{{ hdbversion.stdout_lines.1.split().1 }}"

    - name:                            "5.8 HANA Pacemaker Scale-out - Show the HDB version"
      ansible.builtin.debug:
        var:                           hdb_version

    - name:                            "5.8 HANA Pacemaker Scale-out - Show the HDB version prefix"
      ansible.builtin.debug:
        var:                           hdb_version[0:2]

    - name:                            "5.8 HANA Pacemaker Scale-out - Check required Database HA variables"
      ansible.builtin.set_fact:
        database_high_availability:    "{{ database_high_availability | default(false) }}"
      when:
        - database_high_availability is defined
        - database_high_availability is not defined

# /*---------------------------------------------------------------------------8
# |  SAPHanaSR-angi package detection and installation logic                   |
# +------------------------------------4--------------------------------------*/

- name:                                "5.8 HANA Pacemaker Scale-out - SAPHanaSR-angi package management"
  when:
                                       - node_tier == 'hana'
                                       - ansible_os_family | upper == "SUSE"
  block:
    - name:                            "5.8 HANA Pacemaker Scale-out - Generate list of deployed packages on current host"
      ansible.builtin.package_facts:

    - name:                            "5.8 HANA Pacemaker Scale-out - Get SAPHanaSR-ScaleOut package version"
      ansible.builtin.set_fact:
        saphanaSR_scaleout_version:    "{{ ansible_facts.packages['SAPHanaSR-ScaleOut'][0].version | default('0.0.0') }}"
      when:
                                       - ansible_facts.packages['SAPHanaSR-ScaleOut'] is defined

    - name:                            "5.8 HANA Pacemaker Scale-out - Set default SAPHanaSR-ScaleOut version if not installed"
      ansible.builtin.set_fact:
        saphanaSR_scaleout_version:    "0.0.0"
      when:
                                       - ansible_facts.packages['SAPHanaSR-ScaleOut'] is not defined

    - name:                            "5.8 HANA Pacemaker Scale-out - Get SAPHanaSR-angi package version"
      ansible.builtin.set_fact:
        saphanaSR_angi_version:        "{{ ansible_facts.packages['SAPHanaSR-angi'][0].version | default('0.0.0') }}"
      when:
                                       - ansible_facts.packages['SAPHanaSR-angi'] is defined

    - name:                            "5.8 HANA Pacemaker Scale-out - Set default SAPHanaSR-angi version if not installed"
      ansible.builtin.set_fact:
        saphanaSR_angi_version:        "0.0.0"
      when:
                                       - ansible_facts.packages['SAPHanaSR-angi'] is not defined

    - name:                            "5.8 HANA Pacemaker Scale-out - Display SAPHanaSR package versions"
      ansible.builtin.debug:
        msg:
                                       - "SAPHanaSR-ScaleOut version: {{ saphanaSR_scaleout_version }}"
                                       - "SAPHanaSR-angi version:     {{ saphanaSR_angi_version }}"
                                       - "use_hanasr_angi:            {{ use_hanasr_angi | default(false) }}"

    - name:                            "5.8 HANA Pacemaker Scale-out - Install SAPHanaSR-angi package"
      when:
                                       - use_hanasr_angi | default(false)
                                       - saphanaSR_angi_version == "0.0.0"
      block:
        - name:                        "5.8 HANA Pacemaker Scale-out - Uninstall SAPHanaSR-ScaleOut package"
          ansible.builtin.package:
            name:                      "{{ item }}"
            state:                     absent
          loop:
                                       - SAPHanaSR-ScaleOut
                                       - SAPHanaSR-ScaleOut-doc
                                       - SAPHanaSR
                                       - SAPHanaSR-doc
                                       - yast2-sap-ha
          when:
                                       - ansible_facts.packages[item] is defined

        - name:                        "5.8 HANA Pacemaker Scale-out - Install SAPHanaSR-angi"
          ansible.builtin.package:
            name:                      SAPHanaSR-angi
            state:                     present

        - name:                        "5.8 HANA Pacemaker Scale-out - Refresh package facts after SAPHanaSR-angi install"
          ansible.builtin.package_facts:

        - name:                        "5.8 HANA Pacemaker Scale-out - Update SAPHanaSR-angi version after install"
          ansible.builtin.set_fact:
            saphanaSR_angi_version:    "{{ ansible_facts.packages['SAPHanaSR-angi'][0].version | default('0.0.0') }}"
          when:
                                       - ansible_facts.packages['SAPHanaSR-angi'] is defined

# /*---------------------------------------------------------------------------8
# |                                   END                                     |
# +------------------------------------4--------------------------------------*/

...

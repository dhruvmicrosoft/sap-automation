# RHEL Clustering - Deploy ASCS/ERS cluster resources (Simple Mount)
# NFS filesystems are mounted statically via fstab/autofs on all nodes —
# Pacemaker only manages: VIP + Azure LB + SAPStartSrv + SAPInstance
# Azure ref: https://learn.microsoft.com/en-us/azure/sap/workloads/high-availability-guide-rhel-nfs-simple-mount

# STEPS
# [1] Configure cluster default properties
# [1] Create a virtual IP resource and health-probe for the ASCS instance

- name:                                "5.6.4.0 SCS/ERS Pacemaker - REDHAT - SimpleMount - Central Services - Check if installation succeeded"
  ansible.builtin.stat:
    path:                              "/etc/sap_deployment_automation/{{ sap_sid | upper }}/sap_deployment_scs.txt"
  register:                            scs_installed

- name:                                "5.6.4.0 SCS/ERS Pacemaker - REDHAT - SimpleMount - Cluster Configuration before Install"
  throttle:                            1
  block:
    - name:                            Set pcs command mode based on RHEL version
      ansible.builtin.set_fact:
        pcs_update_cmd:                "{{ 'update' if ansible_distribution_major_version | int >= 10 else '' }}"

    - name:                            "5.6.4.0 SCS/ERS Pacemaker - REDHAT - SimpleMount - Configure cluster default properties"
      ansible.builtin.shell: |
                                       pcs resource defaults{% if pcs_update_cmd %} {{ pcs_update_cmd }}{% endif %} resource-stickiness=1
                                       pcs resource defaults{% if pcs_update_cmd %} {{ pcs_update_cmd }}{% endif %} migration-threshold=3
      register:                        cluster_defaults
      failed_when:                     cluster_defaults.rc != 0

    - name:                            "5.6.4.0 SCS/ERS Pacemaker - REDHAT - SimpleMount - Put Secondary host on standby"
      ansible.builtin.shell:           pcs node standby {{ secondary_instance_name }}

    - name:                            "5.6.4.0 SCS/ERS Pacemaker - REDHAT - SimpleMount - Create ASCS VIP"
      ansible.builtin.shell:   >
                                       pcs resource create vip_{{ sap_sid | upper }}_{{ instance_type | upper }} IPaddr2 \
                                       ip={{ scs_lb_ip }} cidr_netmask={{ subnet_prefix }}
      register:                        ascs_vip
      failed_when:                     ascs_vip.rc > 1

    - name:                            "5.6.4.0 SCS/ERS Pacemaker - REDHAT - SimpleMount - Create ASCS Azure LB resource"
      ansible.builtin.shell:   >
                                       pcs resource create nc_{{ sap_sid | upper }}_{{ instance_type | upper }} azure-lb port=620{{ scs_instance_number }}
      register:                        ascs_lb
      failed_when:                     ascs_lb.rc > 1

    - name:                            "5.6.4.0 SCS/ERS Pacemaker - REDHAT - SimpleMount - Add ASCS VIP and LB to group"
      ansible.builtin.shell:   >
                                       pcs resource group add g-{{ sap_sid | upper }}_{{ instance_type | upper }} \
                                       vip_{{ sap_sid | upper }}_{{ instance_type | upper }} nc_{{ sap_sid | upper }}_{{ instance_type | upper }}
      register:                        ascs_group
      failed_when:                     ascs_group.rc > 1

  when:
    - inventory_hostname == primary_instance_name
    - not scs_installed.stat.exists

# [1] Install SAP NetWeaver ASCS - this is where we call the SCS role
- name:                                "5.6.4.0 SCS/ERS Pacemaker - REDHAT - SimpleMount - Install SCS on Primary host"
  throttle:                            1
  block:
    - name:                            "5.6.4.0 SCS/ERS Pacemaker - REDHAT - SimpleMount - Bring Primary host online"
      ansible.builtin.shell:           pcs node unstandby {{ primary_instance_name }}

    - name:                            "5.6.4.0 SCS/ERS Pacemaker - REDHAT - SimpleMount - Put Secondary host on standby"
      ansible.builtin.shell:           pcs node standby {{ secondary_instance_name }}

    - name:                            "5.6.4.0 SCS/ERS Pacemaker - REDHAT - SimpleMount - Check if NFS mount /usr/sap/{{ sap_sid | upper }} is available before proceeding"
      ansible.builtin.shell: >-
                                       set -o pipefail;
                                       df -kHT | grep '/usr/sap/{{ sap_sid | upper }}'
      register:                        nfs_sys_mounted
      failed_when:                     false
      changed_when:                    false

    - name:                            "5.6.4.0 SCS/ERS Pacemaker - REDHAT - SimpleMount - Attempt to mount SYS directory"
      ansible.builtin.include_role:
        name:                          roles-sap-os/2.6-sap-mounts
        apply:
          tags:
            - sap_app_ha_sys_mount
      when: inventory_hostname == primary_instance_name and nfs_sys_mounted.rc >= 1

    - name:                            "5.6.4.0 SCS/ERS Pacemaker - REDHAT - SimpleMount - Check if NFS mount for instance directory is available before proceeding"
      ansible.builtin.shell: >-
                                       set -o pipefail;
                                       df -kHT | grep '/usr/sap/{{ sap_sid | upper }}'
      register:                        nfs_instdir_mounted
      failed_when:                     nfs_instdir_mounted.rc >= 1
      changed_when:                    false

    - name:                            "5.6.4.0 SCS/ERS Pacemaker - REDHAT - SimpleMount - Assign ownership"
      ansible.builtin.file:
        path:                          "{{ item.path }}"
        owner:                         "{{ sap_sid | lower }}adm"
        group:                         sapsys
        mode:                          "{{ item.mode }}"
        state:                         directory
      loop:
        - { path: '/sapmnt/{{ sap_sid | upper }}', mode: '0755' }
        - { path: '/usr/sap/{{ sap_sid | upper }}/SYS', mode: '0700' }
        - { path: '/usr/sap/{{ sap_sid | upper }}/{{ instance_type | upper }}{{ scs_instance_number }}', mode: '0755' }
      when: inventory_hostname == primary_instance_name

    - name:                            "5.6 SCSERS - REDHAT - SimpleMount - Install SCS on Primary host"
      ansible.builtin.include_role:
        name:                          roles-sap/5.0.1-scs-ha-install

    - name:                            "5.6.4.0 SCS/ERS Pacemaker - REDHAT - SimpleMount - Check if SCS installation succeeded"
      ansible.builtin.stat:
        path:                          "/etc/sap_deployment_automation/{{ sap_sid | upper }}/sap_deployment_scs.txt"
      register:                        scs_installed_final

    - name:                            "ErrorHandling"
      ansible.builtin.fail:
        msg:                           "INSTALL:0014:SCS HA installation failed"
      when:
        - not scs_installed_final.stat.exists

  when:
    - inventory_hostname == primary_instance_name
    - not scs_installed.stat.exists

- name:                                "5.6.4.0 SCS/ERS Pacemaker - REDHAT - SimpleMount - ERS - Check if installation succeeded before"
  ansible.builtin.stat:
    path:                              "/etc/sap_deployment_automation/{{ sap_sid | upper }}/sap_deployment_ers.txt"
  register:                            ers_installed
  when: inventory_hostname == secondary_instance_name

- name:                                "5.6.4.0 SCS/ERS Pacemaker - REDHAT - SimpleMount - ERS - Cluster Configuration before Install"
  throttle:                            1
  block:
    - name:                            "5.6 SCSERS - REDHAT - SimpleMount - ERS - Bring Secondary host online"
      ansible.builtin.shell:           pcs node unstandby {{ secondary_instance_name }}

    - name:                            "5.6 SCSERS - REDHAT - SimpleMount - ERS - Put Primary host on standby"
      ansible.builtin.shell:           pcs node standby {{ primary_instance_name }}

    - name:                            "5.6.4.0 SCS/ERS Pacemaker - REDHAT - SimpleMount - ERS - Create ERS VIP"
      ansible.builtin.shell:   >
                                       pcs resource create vip_{{ sap_sid | upper }}_ERS IPaddr2 \
                                       ip={{ ers_lb_ip }} cidr_netmask={{ subnet_prefix }}
      register:                        ers_vip
      failed_when:                     ers_vip.rc > 1

    - name:                            "5.6.4.0 SCS/ERS Pacemaker - REDHAT - SimpleMount - ERS - Create ERS Azure LB resource"
      ansible.builtin.shell:   >
                                       pcs resource create nc_{{ sap_sid | upper }}_ERS azure-lb port=621{{ ers_instance_number }}
      register:                        ers_alb
      failed_when:                     ers_alb.rc > 1

    - name:                            "5.6.4.0 SCS/ERS Pacemaker - REDHAT - SimpleMount - ERS - Add ERS VIP and LB to group"
      ansible.builtin.shell:   >
                                       pcs resource group add g-{{ sap_sid | upper }}_ERS \
                                       vip_{{ sap_sid | upper }}_ERS nc_{{ sap_sid | upper }}_ERS
      register:                        ers_group
      failed_when:                     ers_group.rc > 1

  when:
    - inventory_hostname == secondary_instance_name
    - not ers_installed.stat.exists

- name:                                "5.6.4.0 SCS/ERS Pacemaker - REDHAT - SimpleMount - Install ERS on Secondary host"
  throttle:                            1
  block:

    - name:                            "5.6.4.0 SCS/ERS Pacemaker - REDHAT - SimpleMount - ERS - Bring Secondary host online"
      ansible.builtin.shell:           pcs node unstandby {{ secondary_instance_name }}

    - name:                            "5.6.4.0 SCS/ERS Pacemaker - REDHAT - SimpleMount - ERS - Put Primary host on standby"
      ansible.builtin.shell:           pcs node standby {{ primary_instance_name }}

    - name:                            "5.6.4.0 SCS/ERS Pacemaker - REDHAT - SimpleMount - ERS - Wait until ERS VIP group has come online"
      ansible.builtin.shell: >-
                                       set -o pipefail;
                                       pcs resource status | grep vip_{{ sap_sid | upper }}_ERS
      register:                        ers_vip_group_status
      until:                           ers_vip_group_status.stdout is search('Started')
      retries:                         15
      delay:                           30
      changed_when:                    false
      when:                            ansible_distribution_major_version in ["9", "10"]

    - name:                            "5.6.4.0 SCS/ERS Pacemaker - REDHAT - SimpleMount - ERS - List NFS mounts"
      ansible.builtin.shell:           df -kHT
      register:                        nfs_instdir_mounted_debug
      changed_when:                    false

    - name:                            "5.6.4.0 SCS/ERS Pacemaker - REDHAT - SimpleMount - ERS - Show NFS mounts"
      ansible.builtin.debug:
        var:                           nfs_instdir_mounted_debug
        verbosity:                     4

    - name:                            "5.6.4.0 SCS/ERS Pacemaker - REDHAT - SimpleMount - ERS - Check Cluster status"
      ansible.builtin.shell:           pcs status --full
      register:                        cluster_status_debug
      changed_when:                    false

    - name:                            "5.6.4.0 SCS/ERS Pacemaker - REDHAT - SimpleMount - ERS - Show Cluster status"
      ansible.builtin.debug:
        var:                           cluster_status_debug
        verbosity:                     2

    - name:                            "5.6.4.0 SCS/ERS Pacemaker - REDHAT - SimpleMount - ERS - Check if NFS mount /usr/sap/{{ sap_sid | upper }} is available before proceeding"
      ansible.builtin.shell: >-
                                       set -o pipefail;
                                       df -kHT | grep '/usr/sap/{{ sap_sid | upper }}'
      register:                        nfs_sys_mounted
      failed_when:                     false
      changed_when:                    false

    - name:                            "5.6 SCSERS - REDHAT - SimpleMount - ERS - Attempt to mount SYS directory"
      ansible.builtin.include_role:
        name:                          roles-sap-os/2.6-sap-mounts
        apply:
          tags:
            - sap_app_ha_sys_mount
      when: inventory_hostname == secondary_instance_name and nfs_sys_mounted.rc >= 1

    - name:                            "5.6.4.0 SCS/ERS Pacemaker - REDHAT - SimpleMount - ERS - Check if NFS mount for instance directory is available before proceeding"
      ansible.builtin.shell: >-
                                       set -o pipefail;
                                       df -kHT | grep '/usr/sap/{{ sap_sid | upper }}'
      register:                        nfs_instdir_mounted
      failed_when:                     nfs_instdir_mounted.rc >= 1
      changed_when:                    false

    - name:                            "5.6.4.0 SCS/ERS Pacemaker - REDHAT - SimpleMount - ERS - Assign ownership"
      ansible.builtin.file:
        path:                          "{{ item.path }}"
        owner:                         "{{ sap_sid | lower }}adm"
        group:                         sapsys
        mode:                          "{{ item.mode }}"
        state:                         directory
      loop:
        - { path: '/sapmnt/{{ sap_sid | upper }}', mode: '0755' }
        - { path: '/usr/sap/{{ sap_sid | upper }}/SYS', mode: '0700' }
        - { path: '/usr/sap/{{ sap_sid | upper }}/ERS{{ ers_instance_number }}', mode: '0755' }
      when: inventory_hostname == secondary_instance_name

    - name:                            "5.6.4.0 SCS/ERS Pacemaker - REDHAT - SimpleMount - ERS - Install on Secondary host"
      ansible.builtin.include_role:
        name:                          roles-sap/5.0.2-ers-ha-install

  always:
    - name:                            "5.6.4.0 SCS/ERS Pacemaker - REDHAT - SimpleMount - ERS - Bring Primary host online"
      ansible.builtin.shell:           pcs node unstandby {{ primary_instance_name }}
      register:                        primary_online
      changed_when:                    primary_online.rc != 0

    - name:                            "5.6.4.0 SCS/ERS Pacemaker - REDHAT - SimpleMount - ERS - Check if installation succeeded"
      ansible.builtin.stat:
        path:                          "/etc/sap_deployment_automation/{{ sap_sid | upper }}/sap_deployment_ers.txt"
      register:                        ers_installed_final

    - name:                            "ErrorHandling"
      ansible.builtin.fail:
        msg:                           "INSTALL:0014:ERS installation failed"
      when:
        - not ers_installed_final.stat.exists

  when:
    - inventory_hostname == secondary_instance_name
    - not ers_installed.stat.exists

# [A] Add firewall rules for ASCS and ERS on both nodes
- name:                                "5.6.4.0 SCS/ERS Pacemaker - REDHAT - SimpleMount - Add firewall rules for ASCS and ERS on both nodes"
  ansible.posix.firewalld:
    zone:                              public
    port:                              "{{ item.port }}/tcp"
    permanent:                         true
    state:                             enabled
  with_items:
    - { port: "620{{ scs_instance_number }}" }
    - { port: "32{{ scs_instance_number }}" }
    - { port: "36{{ scs_instance_number }}" }
    - { port: "39{{ scs_instance_number }}" }
    - { port: "81{{ scs_instance_number }}" }
    - { port: "5{{ scs_instance_number }}13" }
    - { port: "5{{ scs_instance_number }}14" }
    - { port: "5{{ scs_instance_number }}16" }
    - { port: "621{{ ers_instance_number }}" }
    - { port: "32{{ ers_instance_number }}" }
    - { port: "36{{ ers_instance_number }}" }
    - { port: "39{{ ers_instance_number }}" }
    - { port: "81{{ ers_instance_number }}" }
    - { port: "5{{ ers_instance_number }}13" }
    - { port: "5{{ ers_instance_number }}14" }
    - { port: "5{{ ers_instance_number }}16" }
  when: 1 == 2 # ToDo Fix this if we need to enable firewalld


# End of Playbook.


---

# Common RHEL post-install tasks for SAP cluster resources (Classic and SimpleMount).
# Included by 5.6.4.2-sap-resources-RedHat.yml and
#             5.6.4.2-sap-resources-RedHat-SimpleMount.yml

- name:                                "5.6.4.2 SCS/ERS Pacemaker - SAP Resources - REDHAT - Reboot and wait 3 minutes"
  ansible.builtin.debug:
    msg:                               "Reboot and wait 3 minutes"

- name:                                "5.6.4.2 SCS/ERS Pacemaker - SAP Resources - REDHAT - Reboot the primary/secondary instance"
  become:                              true
  become_user:                         root
  ansible.builtin.reboot:
    reboot_timeout:                    180
    post_reboot_delay:                 180
  failed_when:                         false

- name:                                "5.6.4.2 SCS/ERS Pacemaker - SAP Resources - REDHAT - Set the Cluster out of maintenance mode"
  ansible.builtin.shell:               pcs property set maintenance-mode=false
  run_once:                            true

- name:                                "5.6.4.2 SCS/ERS Pacemaker - SAP Resources - REDHAT - Wait for 180 seconds for the cluster to stabilize"
  ansible.builtin.wait_for:
    timeout:                           180
  register:                            wait_for_connection_results

# SCS node has been put on standby and resources have moved. The resource move constraints need to be cleared
# Warning: Following resources have been moved and their move constraints are still in place: 'g-SID_ASCS'
- name:                                "5.6.4.2 SCS/ERS Pacemaker - SAP Resources - REDHAT - Clear move constraints"
  ansible.builtin.shell:               pcs resource clear g-{{ sap_sid | upper }}_{{ instance_type | upper }}
  when: inventory_hostname == primary_instance_name

- name:                                "5.6.4.2 SCS/ERS Pacemaker - SAP Resources - REDHAT - Ensure SAPInstance resources are started"
  ansible.builtin.shell: |
                                       set -o pipefail
                                       pcs status --full | grep SAPInstance | grep Started | wc -l
  register:                            sap_instance_status
  retries:                             40
  delay:                               15
  until:                               (sap_instance_status.stdout | int) == ([(ansible_play_hosts_all | length), 2] | max | int)
  run_once:                            true
  failed_when:                         false

- name:                                "5.6.4.2 SCS/ERS Pacemaker - SAP Resources - REDHAT - SCS cluster group validation"
  ansible.builtin.include_tasks:
    file:                              "5.6.6-validate.yml"
    apply:
      become:                          true
      become_user:                     root
      tags:
        - "5.6.6-validate"
  when: inventory_hostname == primary_instance_name

- name:                                "5.6.4.2 SCS/ERS Pacemaker - SAP Resources - REDHAT - Set Resources Flag"
  ansible.builtin.file:
    path:                              "/etc/sap_deployment_automation/{{ sap_sid | upper }}/sap_resources_deployment.txt"
    state:                             touch
    mode:                              0755

...
